<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R V1 | P2P ENCRYPTED CALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; }
        .cr-panel { border: 1px solid #0f0; background: rgba(0, 15, 0, 0.9); box-shadow: 0 0 20px rgba(0, 255, 0, 0.1); }
        .pulse { animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring { 0% { transform: scale(.33); } 80%, 100% { opacity: 0; } }
        .btn-call { background: #050; border: 1px solid #0f0; transition: 0.3s; }
        .btn-call:hover { background: #0f0; color: #000; }
        .btn-hangup { background: #500; border: 1px solid #f00; color: #fff; }
        .btn-hangup:hover { background: #f00; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full cr-panel rounded-xl p-8 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 right-0 p-2 opacity-20 text-[10px]">C.R V1.0 P2P_MODE</div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-widest uppercase mb-1">C.R CALL SYSTEM</h1>
            <p class="text-[10px] text-green-700">ENCRYPTED P2P | NO SERVER LOGS</p>
        </div>

        <!-- My ID Section -->
        <div class="mb-6">
            <label class="text-[10px] uppercase opacity-60">ID Lo (Share ke Target):</label>
            <div class="flex mt-1">
                <input type="text" id="myId" readonly class="flex-1 bg-black border border-green-900 p-2 text-sm outline-none font-bold" value="Memuat ID...">
                <button onclick="copyId()" class="bg-green-900 px-3 text-xs hover:bg-green-700">COPY</button>
            </div>
        </div>

        <!-- Connection Section -->
        <div class="mb-8">
            <label class="text-[10px] uppercase opacity-60">Masukin ID Target:</label>
            <input type="text" id="targetId" placeholder="Input target ID di sini..." class="w-full mt-1 bg-black border border-green-900 p-2 text-sm outline-none focus:border-green-400">
        </div>

        <!-- Call Status / Interface -->
        <div id="callInterface" class="hidden text-center py-6 border-t border-green-900">
            <div class="relative inline-block mb-4">
                <div class="pulse absolute inset-0 rounded-full bg-green-500"></div>
                <div class="relative bg-green-900 w-16 h-16 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                    </svg>
                </div>
            </div>
            <p id="callStatus" class="text-sm font-bold animate-pulse uppercase">Menghubungkan...</p>
            <audio id="remoteAudio" autoplay class="hidden"></audio>
            
            <button onclick="hangup()" class="btn-hangup mt-6 px-8 py-2 rounded-full font-bold text-xs">PUTUSKAN TELEPON</button>
        </div>

        <!-- Initial Buttons -->
        <div id="mainActions" class="space-y-3">
            <button onclick="startCall()" class="btn-call w-full py-3 font-bold uppercase text-xs">Mulai Telepon P2P</button>
        </div>

        <div id="terminal" class="mt-6 h-20 overflow-y-auto bg-black p-2 text-[9px] border border-green-900 rounded opacity-50">
            [SYSTEM] Menunggu instruksi dari User Gigs...
        </div>
    </div>

    <script>
        // CONFIG FIREBASE GIGS
        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            databaseURL: "https://apktroj-default-rtdb.firebaseio.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab",
            measurementId: "G-WR01BDY3G6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localStream;
        let pc;
        const myId = "CR_" + Math.random().toString(36).substr(2, 6);
        document.getElementById('myId').value = myId;

        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ],
            iceCandidatePoolSize: 10,
        };

        function addLog(msg) {
            const term = document.getElementById('terminal');
            term.innerHTML += `<div>> ${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        // Initialize Call Listener
        db.ref('calls/' + myId).on('value', async (snap) => {
            const data = snap.val();
            if (data && data.offer && !pc) {
                if (confirm("Panggilan masuk dari ID: " + data.callerId)) {
                    answerCall(data);
                }
            }
        });

        async function setupMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                addLog("Mic diaktifkan.");
            } catch (e) {
                alert("Gagal akses mic. Izinin dulu, user.");
            }
        }

        async function startCall() {
            const target = document.getElementById('targetId').value;
            if (!target) return alert("Isi ID target dulu!");

            await setupMedia();
            document.getElementById('mainActions').classList.add('hidden');
            document.getElementById('callInterface').classList.remove('hidden');
            document.getElementById('callStatus').innerText = "Memanggil " + target + "...";

            pc = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref('calls/' + target + '/candidates').push(event.candidate.toJSON());
                }
            };

            pc.ontrack = (event) => {
                document.getElementById('remoteAudio').srcObject = event.streams[0];
                document.getElementById('callStatus').innerText = "TERHUBUNG (P2P)";
                addLog("P2P Stream established.");
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            db.ref('calls/' + target).set({
                offer: { type: offer.type, sdp: offer.sdp },
                callerId: myId
            });

            // Listen for answer
            db.ref('calls/' + target + '/answer').on('value', snap => {
                const answer = snap.val();
                if (answer && !pc.currentRemoteDescription) {
                    pc.setRemoteDescription(new RTCSessionDescription(answer));
                }
            });

            // Listen for ICE candidates
            db.ref('calls/' + myId + '/candidates').on('child_added', snap => {
                if (pc) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        async function answerCall(data) {
            await setupMedia();
            document.getElementById('mainActions').classList.add('hidden');
            document.getElementById('callInterface').classList.remove('hidden');
            document.getElementById('callStatus').innerText = "Menjawab Panggilan...";

            pc = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    db.ref('calls/' + data.callerId + '/candidates').push(event.candidate.toJSON());
                }
            };

            pc.ontrack = (event) => {
                document.getElementById('remoteAudio').srcObject = event.streams[0];
                document.getElementById('callStatus').innerText = "TERHUBUNG (P2P)";
            };

            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            db.ref('calls/' + myId + '/answer').set({ type: answer.type, sdp: answer.sdp });

            // Listen for ICE candidates
            db.ref('calls/' + myId + '/candidates').on('child_added', snap => {
                if (pc) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        function hangup() {
            if (pc) pc.close();
            db.ref('calls/' + myId).remove();
            location.reload();
        }

        function copyId() {
            const copyText = document.getElementById("myId");
            copyText.select();
            document.execCommand("copy");
            addLog("ID berhasil dicopy.");
        }
    </script>
</body>
</html>
