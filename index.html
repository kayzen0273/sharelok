<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R V1 | P2P VOICE PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; }
        .cr-card { border: 1px solid #0f0; background: #050505; box-shadow: 0 0 30px rgba(0, 255, 0, 0.05); }
        .vol-bar { height: 4px; background: #030; width: 100%; position: relative; overflow: hidden; }
        .vol-fill { height: 100%; background: #0f0; width: 0%; transition: width 0.1s; }
        .btn { transition: 0.2s; border: 1px solid #0f0; text-transform: uppercase; font-size: 10px; font-weight: bold; }
        .btn:hover:not(:disabled) { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full cr-card rounded-lg p-6 border-t-4 border-t-green-500">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-xl font-black italic">C.R P2P VOICE</h1>
                <p class="text-[9px] opacity-50">STRICTLY FOR USER: GIGS</p>
            </div>
            <div id="connection-indicator" class="text-[9px] border border-red-500 text-red-500 px-2 py-1">OFFLINE</div>
        </div>

        <!-- My ID -->
        <div class="bg-black p-3 border border-green-900 mb-4">
            <label class="text-[9px] uppercase text-green-700 block mb-1">ID Lo (Kirim ke Target):</label>
            <div class="flex gap-2">
                <input type="text" id="myIdDisplay" readonly class="bg-transparent text-white font-bold w-full outline-none text-sm">
                <button onclick="copyId()" class="text-[10px] text-green-500 underline">COPY</button>
            </div>
        </div>

        <!-- Input Target -->
        <div class="mb-6">
            <label class="text-[9px] uppercase text-green-700 block mb-1">Input ID Target:</label>
            <input type="text" id="targetIdInput" placeholder="Paste ID target..." class="w-full bg-black border border-green-900 p-2 text-sm outline-none focus:border-green-400 text-white">
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button id="callBtn" onclick="initiateCall()" class="btn py-3 bg-green-950 text-green-400">Panggil</button>
            <button id="hangupBtn" onclick="endCall()" class="btn py-3 bg-red-950 text-red-500 border-red-500" disabled>Hangup</button>
        </div>

        <!-- Voice Meter -->
        <div class="mb-4">
            <div class="flex justify-between text-[9px] mb-1 uppercase text-gray-500">
                <span>Mic Activity</span>
                <span id="call-timer">00:00</span>
            </div>
            <div class="vol-bar"><div id="volFill" class="vol-fill"></div></div>
        </div>

        <!-- System Log -->
        <div id="log" class="text-[8px] h-16 overflow-y-auto bg-black border border-green-950 p-2 text-gray-500 leading-tight">
            [SYSTEM] Awaiting user interaction...
        </div>

        <audio id="remoteAudio" autoplay></audio>
    </div>

    <script>
        // CONFIG FIREBASE GIGS
        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            databaseURL: "https://apktroj-default-rtdb.firebaseio.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab",
            measurementId: "G-WR01BDY3G6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = "CR-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        document.getElementById('myIdDisplay').value = myId;

        let localStream, remoteStream, peerConnection;
        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ],
            iceCandidatePoolSize: 10,
        };

        function writeLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // Monitoring Mic Level
        function monitorMic(stream) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function update() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<bufferLength; i++) sum += dataArray[i];
                let average = sum / bufferLength;
                document.getElementById('volFill').style.width = (average * 2) + "%";
                requestAnimationFrame(update);
            }
            update();
        }

        // 1. Setup Media & Listen for Incoming
        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true }, video: false });
                monitorMic(localStream);
                writeLog("Mic Active. Ready.");
                document.getElementById('connection-indicator').innerText = "ONLINE";
                document.getElementById('connection-indicator').classList.replace('text-red-500', 'text-green-500');
                document.getElementById('connection-indicator').classList.replace('border-red-500', 'border-green-500');

                // Listen for Calls
                db.ref('calls/' + myId).on('value', async snap => {
                    const data = snap.val();
                    if (data && data.offer && !peerConnection) {
                        handleIncomingCall(data);
                    }
                });
            } catch (e) {
                writeLog("ERROR: Izinin Mic dulu!");
            }
        }

        // 2. Initiate Call
        async function initiateCall() {
            const targetId = document.getElementById('targetIdInput').value;
            if(!targetId) return alert("Mana ID targetnya?");

            writeLog(`Calling ${targetId}...`);
            document.getElementById('callBtn').disabled = true;
            document.getElementById('hangupBtn').disabled = false;

            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = event => {
                document.getElementById('remoteAudio').srcObject = event.streams[0];
                writeLog("P2P Audio Connected.");
            };

            peerConnection.onicecandidate = event => {
                if(event.candidate) {
                    db.ref(`calls/${targetId}/candidates`).push(event.candidate.toJSON());
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            const callData = { offer: { type: offer.type, sdp: offer.sdp }, caller: myId };
            await db.ref('calls/' + targetId).set(callData);

            // Watch for answer
            db.ref(`calls/${targetId}/answer`).on('value', snap => {
                const answer = snap.val();
                if(answer && !peerConnection.currentRemoteDescription) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                }
            });

            // Watch for candidates
            db.ref(`calls/${myId}/candidates`).on('child_added', snap => {
                peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        // 3. Handle Incoming
        async function handleIncomingCall(data) {
            writeLog("Incoming call...");
            if(!confirm(`Terima telepon dari ${data.caller}?`)) {
                db.ref('calls/' + myId).remove();
                return;
            }

            document.getElementById('callBtn').disabled = true;
            document.getElementById('hangupBtn').disabled = false;

            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = event => {
                document.getElementById('remoteAudio').srcObject = event.streams[0];
                writeLog("P2P Audio Connected.");
            };

            peerConnection.onicecandidate = event => {
                if(event.candidate) {
                    db.ref(`calls/${data.caller}/candidates`).push(event.candidate.toJSON());
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            await db.ref(`calls/${myId}/answer`).set({ type: answer.type, sdp: answer.sdp });

            db.ref(`calls/${myId}/candidates`).on('child_added', snap => {
                peerConnection.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        function endCall() {
            db.ref('calls/' + myId).remove();
            location.reload();
        }

        function copyId() {
            const el = document.createElement('textarea');
            el.value = myId;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            writeLog("ID Copied.");
        }

        // Start init on load
        window.onload = init;
    </script>
</body>
</html>
