<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R V1 | WA VOICE GROUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .wa-green { background-color: #00a884; }
        .wa-dark { background-color: #202c33; }
        .wa-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded51.png'); opacity: 0.06; position: fixed; inset: 0; z-index: -1; }
        .member-card { transition: 0.3s; border-left: 4px solid transparent; }
        .member-card.speaking { border-left: 4px solid #00a884; background: #2a3942; }
        .pulse { animation: pulse-wa 1.5s infinite; }
        @keyframes pulse-wa { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div class="wa-bg"></div>

    <!-- Header -->
    <header class="wa-dark p-4 flex items-center justify-between shadow-md z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full wa-green flex items-center justify-center font-bold text-white shadow-lg">C.R</div>
            <div>
                <h1 class="font-bold text-sm">Gigs V1 Group Chat</h1>
                <p id="online-count" class="text-[10px] text-gray-400 font-medium tracking-wider uppercase">0 Member Online</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="location.reload()" class="opacity-70 hover:opacity-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-4 space-y-2 z-10" id="members-list">
        <!-- List member bakal muncul di sini -->
    </main>

    <!-- Footer / Control -->
    <footer class="wa-dark p-6 border-t border-gray-800 z-10">
        <div id="setup-panel" class="mb-4">
            <input type="text" id="username" placeholder="Masukin Nama Lo..." class="w-full bg-[#2a3942] border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-[#00a884] outline-none mb-3">
            <button onclick="joinGroup()" class="w-full wa-green py-3 rounded-lg font-bold text-sm text-black hover:bg-[#008f6f] transition">GABUNG VOICE CHAT</button>
        </div>

        <div id="voice-controls" class="hidden flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div id="mic-indicator" class="hidden pulse absolute inset-0 bg-green-500 rounded-full"></div>
                    <button id="mute-btn" onclick="toggleMute()" class="relative z-10 p-3 bg-gray-700 rounded-full">
                        <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                    </button>
                </div>
                <div class="text-xs">
                    <p class="font-bold text-green-500">VOICE AKTIF</p>
                    <p class="text-[10px] opacity-50">Enkripsi P2P Aktif</p>
                </div>
            </div>
            <button onclick="leaveGroup()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-lg text-xs font-bold border border-red-500/30">KELUAR</button>
        </div>
    </footer>

    <!-- Audio Containers -->
    <div id="remote-audios"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            databaseURL: "https://apktroj-default-rtdb.firebaseio.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab",
            measurementId: "G-WR01BDY3G6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        
        let myId = "USR-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        let myName = "";
        let localStream;
        let peers = {};
        let isMuted = false;

        // 1. Monitor Members Online
        db.ref('group/members').on('value', snap => {
            const list = document.getElementById('members-list');
            const count = document.getElementById('online-count');
            const data = snap.val() || {};
            
            list.innerHTML = '';
            const members = Object.keys(data);
            count.innerText = `${members.length} Member Online`;

            members.forEach(id => {
                const isMe = id === myId;
                list.innerHTML += `
                    <div id="card-${id}" class="member-card wa-dark p-3 rounded-lg flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gray-600 flex items-center justify-center text-xs font-bold">
                                ${data[id].name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h3 class="text-sm font-medium">${data[id].name} ${isMe ? '(Lo)' : ''}</h3>
                                <p class="text-[10px] text-green-500">${data[id].status || 'Mendengarkan...'}</p>
                            </div>
                        </div>
                        ${isMe ? '' : `<div class="text-[10px] opacity-30 italic">P2P Linked</div>`}
                    </div>
                `;
            });
        });

        // 2. Gabung Group
        async function joinGroup() {
            myName = document.getElementById('username').value || "Guest_" + myId.substr(-3);
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                document.getElementById('setup-panel').classList.add('hidden');
                document.getElementById('voice-controls').classList.remove('hidden');

                // Register ke DB
                const userRef = db.ref('group/members/' + myId);
                userRef.set({ name: myName, status: 'Lagi Ngomong...' });
                userRef.onDisconnect().remove();

                // Listen for new offers from others
                db.ref('group/calls/' + myId).on('child_added', async snap => {
                    const call = snap.val();
                    await handleOffer(call.from, call.offer);
                });

                // Broadcast presence to all existing members to initiate call
                const allMembers = await db.ref('group/members').once('value');
                const members = allMembers.val();
                for (let id in members) {
                    if (id !== myId) initiateCall(id);
                }

                startMicMonitor();
            } catch (e) {
                alert("Woi, izinin Mic dulu!");
            }
        }

        // 3. WebRTC Logic (Mesh Network)
        async function initiateCall(targetId) {
            const pc = new RTCPeerConnection(rtcConfig);
            peers[targetId] = pc;

            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            pc.onicecandidate = e => {
                if (e.candidate) db.ref(`group/ice/${targetId}/${myId}`).push(e.candidate.toJSON());
            };

            pc.ontrack = e => {
                addRemoteAudio(targetId, e.streams[0]);
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            db.ref(`group/calls/${targetId}/${myId}`).set({ from: myId, offer: { type: offer.type, sdp: offer.sdp } });

            // Listen for answer
            db.ref(`group/answers/${myId}/${targetId}`).on('value', async snap => {
                const ans = snap.val();
                if (ans && !pc.currentRemoteDescription) await pc.setRemoteDescription(new RTCSessionDescription(ans));
            });

            // Listen for ICE
            db.ref(`group/ice/${myId}/${targetId}`).on('child_added', snap => {
                pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        async function handleOffer(fromId, offer) {
            const pc = new RTCPeerConnection(rtcConfig);
            peers[fromId] = pc;

            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            pc.onicecandidate = e => {
                if (e.candidate) db.ref(`group/ice/${fromId}/${myId}`).push(e.candidate.toJSON());
            };

            pc.ontrack = e => {
                addRemoteAudio(fromId, e.streams[0]);
            };

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const ans = await pc.createAnswer();
            await pc.setLocalDescription(ans);

            db.ref(`group/answers/${fromId}/${myId}`).set({ type: ans.type, sdp: ans.sdp });

            db.ref(`group/ice/${myId}/${fromId}`).on('child_added', snap => {
                pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
        }

        function addRemoteAudio(id, stream) {
            let audio = document.getElementById('audio-' + id);
            if (!audio) {
                audio = document.createElement('audio');
                audio.id = 'audio-' + id;
                audio.autoplay = true;
                document.getElementById('remote-audios').appendChild(audio);
            }
            audio.srcObject = stream;
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            const btn = document.getElementById('mute-btn');
            const icon = document.getElementById('mic-icon');
            const indicator = document.getElementById('mic-indicator');
            
            if (isMuted) {
                btn.classList.add('bg-red-500');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" />';
                indicator.classList.add('hidden');
                db.ref('group/members/' + myId + '/status').set('Mute');
            } else {
                btn.classList.remove('bg-red-500');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />';
                db.ref('group/members/' + myId + '/status').set('Lagi Ngomong...');
            }
        }

        function startMicMonitor() {
            const ctx = new AudioContext();
            const src = ctx.createMediaStreamSource(localStream);
            const analyzer = ctx.createAnalyser();
            src.connect(analyzer);
            const data = new Uint8Array(analyzer.frequencyBinCount);
            
            function check() {
                analyzer.getByteFrequencyData(data);
                const vol = data.reduce((a, b) => a + b) / data.length;
                const indicator = document.getElementById('mic-indicator');
                const myCard = document.getElementById('card-' + myId);
                
                if (vol > 15 && !isMuted) {
                    indicator.classList.remove('hidden');
                    if (myCard) myCard.classList.add('speaking');
                } else {
                    indicator.classList.add('hidden');
                    if (myCard) myCard.classList.remove('speaking');
                }
                requestAnimationFrame(check);
            }
            check();
        }

        function leaveGroup() {
            db.ref('group/members/' + myId).remove();
            location.reload();
        }
    </script>
</body>
</html>
