<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaHeart 3D - Web Gesture Controller (FINAL FIX)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2;
            pointer-events: none;
        }
        #camera-feed {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            z-index: 2;
            border: 2px solid #00ff00;
            border-radius: 8px;
            transform: scaleX(-1); /* Mirror camera */
            background-color: #222;
        }
        .status-text {
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 5px;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-size: 20px;
            text-align: center;
        }
        .falling-heart {
            position: absolute;
            top: -30px;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            z-index: 3;
            animation-name: fall;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .love-caption {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 32px;
            font-weight: bold;
            color: #ffb3d9;
            text-shadow: 2px 2px 6px #000;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            text-align: center;
            max-width: 90vw;
        }
        .love-caption.show {
            opacity: 1;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== Overlay Galaksi Cinta (dibuka/ditutup dengan gestur 👌) ===== */
        #galaxilove-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: black;
        }
        #galaxilove-overlay .webgl { position: fixed; top: 0; left: 0; outline: none; }
        #gl-titulo-corazon {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd7ef;
            font-family: Arial, sans-serif;
            font-size: clamp(1.2rem, 2.8vw, 2rem);
            font-weight: bold;
            text-shadow: 0 0 10px #ff3ea5, 0 0 24px #ff3ea5;
            z-index: 20;
            pointer-events: none;
        }
        #gl-hint {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd7ef;
            font-family: Arial, sans-serif;
            font-size: 15px;
            text-shadow: 0 0 8px #ff3ea5;
            z-index: 20;
            pointer-events: none;
            text-align: center;
        }
        #gl-close-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 25;
            background: rgba(255, 77, 166, 0.85);
            color: #fff;
            border: none;
            border-radius: 999px;
            width: 38px;
            height: 38px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #gl-modal-carta {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 30;
        }
        #gl-modal-carta.visible { display: flex; }
        #gl-modal-carta .carta {
            width: min(86vw, 420px);
            background: linear-gradient(160deg, #fff8fb 0%, #ffe9f4 100%);
            border: 2px solid #ffc7e4;
            border-radius: 18px;
            padding: 22px 20px 16px;
            box-shadow: 0 12px 36px rgba(255, 20, 147, 0.4);
            color: #8a235f;
            font-family: 'Georgia', serif;
            text-align: center;
            position: relative;
            animation: cartaAparece 0.28s ease-out;
        }
        #gl-modal-carta .carta h3 { font-size: 1.15rem; margin-bottom: 10px; }
        #gl-mensaje-romantico {
            font-size: clamp(1.05rem, 2.5vw, 1.35rem);
            line-height: 1.5;
            color: #b01867;
            text-shadow: 0 0 10px rgba(255, 70, 150, 0.2);
        }
        #gl-cerrar-carta {
            margin-top: 14px;
            border: none;
            border-radius: 999px;
            background: #ff4da6;
            color: #fff;
            font-size: 0.95rem;
            font-weight: bold;
            padding: 8px 16px;
            cursor: pointer;
        }
        @keyframes cartaAparece {
            from { opacity: 0; transform: scale(0.9) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        #gl-modal-wishlist {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 30;
        }
        #gl-modal-wishlist.visible { display: flex; }
        #gl-wishlist-list {
            list-style: none;
            padding: 0;
            margin: 12px 0;
            max-height: 220px;
            overflow-y: auto;
            text-align: left;
        }
        #gl-wishlist-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 4px;
            border-bottom: 1px dashed #ffc7e4;
            font-size: 0.95rem;
        }
        #gl-wishlist-list li.done span { text-decoration: line-through; opacity: 0.55; }
        #gl-wishlist-list li input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: #ff4da6; cursor: pointer; flex-shrink: 0;
        }
        #gl-wishlist-list li span { flex: 1; word-break: break-word; }
        #gl-wishlist-list li .gl-wishlist-remove {
            background: none; border: none; color: #c2447e; font-size: 1rem; cursor: pointer; padding: 0 4px;
        }
        #gl-wishlist-list li .gl-wishlist-send {
            background: none; border: none; font-size: 1rem; cursor: pointer; padding: 0 4px;
            opacity: 0.85; transition: transform 0.15s ease;
        }
        #gl-wishlist-list li .gl-wishlist-send:hover { transform: scale(1.15); }
        #gl-wishlist-list li .gl-wishlist-send:disabled { opacity: 0.5; cursor: default; transform: none; }
        .gl-wishlist-add-row { display: flex; gap: 6px; margin-top: 4px; }
        #gl-wishlist-input {
            flex: 1;
            padding: 9px 10px;
            border-radius: 10px;
            border: 1px solid #ffc7e4;
            font-size: 0.9rem;
            font-family: inherit;
        }
        #gl-wishlist-add-btn {
            border: none;
            border-radius: 10px;
            background: #ff4da6;
            color: #fff;
            font-weight: bold;
            padding: 0 16px;
            cursor: pointer;
            font-size: 1.15rem;
        }
    </style>
</head>
<body>

    <div class="loading" id="loading-screen">
        <h2>Mempersiapkan NebulaHeart 3D...</h2>
        <p>Mohon izinkan akses Kamera saat diminta.</p>
    </div>

    <div id="ui-layer" style="display: none;">
        <div class="status-text" id="mode-text">MODE: MENCARI TANGAN...</div>
    </div>
    
    <video id="camera-feed" autoplay playsinline style="display: none;"></video>
    <div id="canvas-container"></div>
    <div id="love-caption" class="love-caption"></div>

    <!-- ===== Overlay Galaksi Cinta - dibuka/ditutup dengan gestur OK Sign 👌 ===== -->
    <div id="galaxilove-overlay">
        <canvas class="webgl" id="gl-canvas"></canvas>
        <div id="gl-titulo-corazon">Tekan hatinya</div>
        <div id="gl-hint">Buat gestur 👌 lagi untuk kembali</div>
        <button id="gl-close-btn" title="Tutup">✕</button>
        <div id="gl-modal-carta">
            <div class="carta">
                <h3>Untukmu</h3>
                <p id="gl-mensaje-romantico"></p>
                <button id="gl-cerrar-carta">Tutup</button>
            </div>
        </div>
        <div id="gl-modal-wishlist">
            <div class="carta">
                <h3>Wishlist Kita 📝</h3>
                <ul id="gl-wishlist-list"></ul>
                <div class="gl-wishlist-add-row">
                    <input type="text" id="gl-wishlist-input" placeholder="Tambah wishlist..." maxlength="70">
                    <button id="gl-wishlist-add-btn" title="Tambah">+</button>
                </div>
                <button id="gl-cerrar-wishlist">Tutup</button>
            </div>
        </div>
        <audio id="gl-musica-fondo" loop>
            <source src="cintanya akuu.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI & INISIALISASI
        // ==========================================
        const NUM_PARTICLES = 1500;
        let currentMode = 1; 
        
        let handTarget = { x: 0, y: 0, z: 0 };
        let handCurrent = { x: 0, y: 0, z: -12 };
        let rotationAngle = 0;

        // Teks Label Mode
        const modeLabels = {
            1: "ROTASI KOSMOS (Semua Jari Buka)",
            2: "GALAKSI SPIRAL 🌌 (1 Jari Telunjuk)",
            3: "TEKS I LOVE YOU (2 Jari / Peace)",
            4: "BENTUK HATI (Tangan Mengepal)",
            5: "SELY 🫰 (Finger Heart)",
            7: "DNA HELIX 🧬 (Rock Sign)",
            9: "ZEN & CINTA 🤟 (I Love You Sign)"
        };

        // Gestur OK Sign 👌 sekarang dipakai untuk toggle overlay "Galaksi Cinta"
        let lastOkSignActive = false;
        let lastOkToggleTime = 0;
        const OK_TOGGLE_COOLDOWN = 1500; // ms, biar tidak toggle berkali-kali per detik

        // ==========================================
        // SETUP THREE.JS (RENDERER 3D)
        // ==========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.z = 0; 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Render manual (autoClear = false) supaya bisa bikin efek "jejak komet" (trail)
        renderer.autoClear = false;
        const trailScene = new THREE.Scene();
        const trailCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const trailPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(2, 2),
            new THREE.MeshBasicMaterial({
                color: 0x000000,
                transparent: true,
                opacity: 0.15,
                depthWrite: false,
                depthTest: false
            })
        );
        trailScene.add(trailPlane);

        // Latar bintang statis (Starfield) biar suasana makin "angkasa"
        const NUM_STARS = 600;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(NUM_STARS * 3);
        for (let i = 0; i < NUM_STARS; i++) {
            starPositions[i * 3]     = (Math.random() - 0.5) * 60;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
            starPositions[i * 3 + 2] = -15 - Math.random() * 25;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({
            size: 0.08,
            color: 0xffffff,
            transparent: true,
            opacity: 0.5,
            sizeAttenuation: true
        });
        const starField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starField);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(NUM_PARTICLES * 3);
        const colors = new Float32Array(NUM_PARTICLES * 3);
        const currentPositions = new Float32Array(NUM_PARTICLES * 3);
        
        const posSpace = new Float32Array(NUM_PARTICLES * 3);
        const posText = new Float32Array(NUM_PARTICLES * 3);
        const posHeart = new Float32Array(NUM_PARTICLES * 3);
        const posSely = new Float32Array(NUM_PARTICLES * 3);
        const posGalaxy = new Float32Array(NUM_PARTICLES * 3);
        const posDNA = new Float32Array(NUM_PARTICLES * 3);
        const posPray = new Float32Array(NUM_PARTICLES * 3); // Mode 9: ZEN + HATI + SELY (vertikal)
        const PRAY_ZEN_COUNT = Math.floor(NUM_PARTICLES * 0.34);
        const PRAY_HEART_COUNT = Math.floor(NUM_PARTICLES * 0.33);

        generateShapes();

        for(let i = 0; i < NUM_PARTICLES * 3; i++) {
            currentPositions[i] = posSpace[i];
            positions[i] = posSpace[i];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        function createTextParticles(text, targetArray, scaleX, scaleY, offsetX, offsetY) {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = 800; offCanvas.height = 200;
            const ctx = offCanvas.getContext('2d');
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, 800, 200);
            ctx.fillStyle = "white"; ctx.font = "bold 130px sans-serif";
            ctx.fillText(text, offsetX, offsetY);
            
            const imgData = ctx.getImageData(0, 0, 800, 200).data;
            const textPoints = [];
            for (let y = 0; y < 200; y += 2) {
                for (let x = 0; x < 800; x += 2) {
                    let alpha = imgData[((y * 800) + x) * 4 + 0]; 
                    if (alpha > 128) {
                        textPoints.push({
                            x: (x - 400) / scaleX,
                            y: -(y - 100) / scaleY,
                            z: (Math.random() * 0.2) - 0.1
                        });
                    }
                }
            }
            for(let i=0; i < NUM_PARTICLES; i++) {
                let p = textPoints[Math.floor(Math.random() * textPoints.length)];
                targetArray[i*3] = p.x;
                targetArray[i*3+1] = p.y;
                targetArray[i*3+2] = p.z;
            }
        }

        function generateShapes() {
            for(let i=0; i < NUM_PARTICLES; i++) {
                posSpace[i*3] = (Math.random() * 8) - 4.0;
                posSpace[i*3+1] = (Math.random() * 8) - 4.0;
                posSpace[i*3+2] = (Math.random() * 8) - 4.0;
            }

            createTextParticles("I LOVE YOU", posText, 70.0, 70.0, 20, 140);
            createTextParticles("SELY", posSely, 70.0, 70.0, 230, 140);

            for(let i=0; i < NUM_PARTICLES; i++) {
                let t = (Math.random() * 2 * Math.PI) - Math.PI;
                let p = (Math.random() * 2 * Math.PI) - Math.PI;
                let x = 2.0 * Math.pow(Math.sin(t), 3);
                let y = 2.0 * Math.cos(t) - 0.7 * Math.cos(2*t) - 0.3 * Math.cos(3*t) - 0.1 * Math.cos(4*t);
                let z = Math.sin(p) * 0.4;
                
                posHeart[i*3] = x * 0.85;
                posHeart[i*3+1] = (y * 0.85) + 0.5;
                posHeart[i*3+2] = z;
            }

            // GALAKSI SPIRAL (Mode 6)
            const numArms = 3;
            const galaxyRadius = 2.6;
            for (let i = 0; i < NUM_PARTICLES; i++) {
                let arm = i % numArms;
                let t = Math.random();
                let angle = t * Math.PI * 4 + (arm * (2 * Math.PI / numArms));
                angle += (Math.random() - 0.5) * 0.45;
                let radius = t * galaxyRadius + (Math.random() - 0.5) * 0.15;
                posGalaxy[i*3]   = radius * Math.cos(angle);
                posGalaxy[i*3+1] = (Math.random() - 0.5) * 0.18 * (1 - t * 0.5);
                posGalaxy[i*3+2] = radius * Math.sin(angle);
            }

            // DNA HELIX (Mode 7)
            const dnaHeight = 3.6;
            const dnaRadius = 0.9;
            const dnaTurns = 3;
            for (let i = 0; i < NUM_PARTICLES; i++) {
                if (i % 10 === 0) {
                    // Partikel "anak tangga" yang menghubungkan dua untai DNA
                    let tt = (Math.floor(i / 10) / (NUM_PARTICLES / 10)) * dnaHeight - dnaHeight / 2;
                    let angle = (tt / dnaHeight) * dnaTurns * Math.PI * 2;
                    let frac = Math.random();
                    let rx1 = dnaRadius * Math.cos(angle);
                    let rz1 = dnaRadius * Math.sin(angle);
                    let rx2 = dnaRadius * Math.cos(angle + Math.PI);
                    let rz2 = dnaRadius * Math.sin(angle + Math.PI);
                    posDNA[i*3]   = rx1 + (rx2 - rx1) * frac;
                    posDNA[i*3+1] = tt;
                    posDNA[i*3+2] = rz1 + (rz2 - rz1) * frac;
                } else {
                    let strand = i % 2;
                    let tt = (i / NUM_PARTICLES) * dnaHeight - dnaHeight / 2;
                    let angle = (tt / dnaHeight) * dnaTurns * Math.PI * 2 + (strand === 1 ? Math.PI : 0);
                    posDNA[i*3]   = dnaRadius * Math.cos(angle) + (Math.random() - 0.5) * 0.05;
                    posDNA[i*3+1] = tt;
                    posDNA[i*3+2] = dnaRadius * Math.sin(angle) + (Math.random() - 0.5) * 0.05;
                }
            }

            // ZEN + HATI + SELY (Mode 9) - disusun VERTIKAL: teks "ZEN" (atas),
            // bentuk hati (tengah), lalu teks "SELY" (bawah)
            const zenTextPoints = [];
            {
                const offCanvas3 = document.createElement('canvas');
                offCanvas3.width = 800; offCanvas3.height = 200;
                const ctx3 = offCanvas3.getContext('2d');
                ctx3.fillStyle = "black"; ctx3.fillRect(0, 0, 800, 200);
                ctx3.fillStyle = "white"; ctx3.font = "bold 130px sans-serif";
                const zenWidth = ctx3.measureText("ZEN").width;
                ctx3.fillText("ZEN", (800 - zenWidth) / 2, 140);
                const imgData3 = ctx3.getImageData(0, 0, 800, 200).data;
                for (let y = 0; y < 200; y += 2) {
                    for (let x = 0; x < 800; x += 2) {
                        let alpha = imgData3[((y * 800) + x) * 4 + 0];
                        if (alpha > 128) {
                            zenTextPoints.push({
                                x: (x - 400) / 90.0,
                                y: -(y - 100) / 90.0,
                                z: (Math.random() * 0.2) - 0.1
                            });
                        }
                    }
                }
            }

            const selyTextPoints = [];
            {
                const offCanvas2 = document.createElement('canvas');
                offCanvas2.width = 800; offCanvas2.height = 200;
                const ctx2 = offCanvas2.getContext('2d');
                ctx2.fillStyle = "black"; ctx2.fillRect(0, 0, 800, 200);
                ctx2.fillStyle = "white"; ctx2.font = "bold 130px sans-serif";
                ctx2.fillText("SELY", 230, 140);
                const imgData2 = ctx2.getImageData(0, 0, 800, 200).data;
                for (let y = 0; y < 200; y += 2) {
                    for (let x = 0; x < 800; x += 2) {
                        let alpha = imgData2[((y * 800) + x) * 4 + 0];
                        if (alpha > 128) {
                            selyTextPoints.push({
                                x: (x - 400) / 90.0,
                                y: -(y - 100) / 90.0,
                                z: (Math.random() * 0.2) - 0.1
                            });
                        }
                    }
                }
            }

            for (let i = 0; i < NUM_PARTICLES; i++) {
                if (i < PRAY_ZEN_COUNT) {
                    // Teks "ZEN" di ATAS
                    let p = zenTextPoints[Math.floor(Math.random() * zenTextPoints.length)];
                    posPray[i*3]   = p.x;
                    posPray[i*3+1] = p.y + 2.3; // posisi ATAS
                    posPray[i*3+2] = p.z;
                } else if (i < PRAY_ZEN_COUNT + PRAY_HEART_COUNT) {
                    // Bentuk hati kecil di TENGAH
                    let t = (Math.random() * 2 * Math.PI) - Math.PI;
                    let x = 2.0 * Math.pow(Math.sin(t), 3);
                    let y = 2.0 * Math.cos(t) - 0.7 * Math.cos(2*t) - 0.3 * Math.cos(3*t) - 0.1 * Math.cos(4*t);
                    posPray[i*3]   = x * 0.45;
                    posPray[i*3+1] = (y * 0.45) + 0.1; // posisi TENGAH
                    posPray[i*3+2] = (Math.random() - 0.5) * 0.3;
                } else {
                    // Teks "SELY" di BAWAH
                    let p = selyTextPoints[Math.floor(Math.random() * selyTextPoints.length)];
                    posPray[i*3]   = p.x;
                    posPray[i*3+1] = p.y - 2.4; // posisi BAWAH
                    posPray[i*3+2] = p.z;
                }
            }
        }

        // ==========================================
        // LOGIKA DETEKSI GESTUR - URUTAN DIPERBAIKI
        // ==========================================
        function calculateGestureMode(landmarks) {
            const tips = [8, 12, 16, 20];
            const pips = [6, 10, 14, 18];
            
            // Cek status masing-masing 4 jari (Telunjuk, Tengah, Manis, Kelingking)
            let fingersUp = tips.map((tip, i) => landmarks[tip].y < landmarks[pips[i]].y);

            // 1. Cek Mode SELY 🫰 (Prioritas Pertama)
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const dxHeart = thumbTip.x - indexTip.x;
            const dyHeart = thumbTip.y - indexTip.y;
            const distHeart = Math.sqrt(dxHeart*dxHeart + dyHeart*dyHeart);
            
            // Jika Jempol & Telunjuk berdekatan, dan 3 jari lainnya menekuk
            if (distHeart < 0.08 && !fingersUp[1] && !fingersUp[2] && !fingersUp[3]) {
                return 5; 
            }

                const dyThumbMcp = thumbMcp.y - pinkyMcp.y;

                // Jempol terentang menjauh dari telapak (bukan terlipat) -> gestur 🤟
                if (distThumbTipPinky > distThumbMcpPinky * 1.1) {

                } else if (currentMode === 2) { // Galaksi - 3 lengan gradasi emas/ungu/biru

                    else if (arm === 1) { colAttr[i*3] = 0.6; colAttr[i*3+1] = 0.2; colAttr[i*3+2] = 1.0; }

        function generateGalaxy() {
            const parameters = {
                count: 80000, size: 0.01, radius: 6, branches: 4, spin: 1,
                randomness: 0.2, randomnessPower: 3,
                insideColor: "#ff1b6b", outsideColor: "#3000ff"
            };
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(parameters.count * 3);
            const colors = new Float32Array(parameters.count * 3);
            const colorInside = new THREE.Color(parameters.insideColor);
            const colorOutside = new THREE.Color(parameters.outsideColor);

            for (let i = 0; i < parameters.count; i++) {
                const i3 = i * 3;
                const radius = Math.random() * parameters.radius;
                const spinAngle = radius * parameters.spin;
                const branchAngle = ((i % parameters.branches) / parameters.branches) * Math.PI * 2;
                const randomX = (Math.random() - 0.5) * parameters.randomness * radius;
                const randomY = (Math.random() - 0.5) * parameters.randomness * radius;
                const randomZ = (Math.random() - 0.5) * parameters.randomness * radius;

                positions[i3]     = Math.cos(branchAngle + spinAngle) * radius + randomX;
                positions[i3 + 1] = randomY;
                positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

                const mixed = colorInside.clone().lerp(colorOutside, radius / parameters.radius);
                colors[i3] = mixed.r; colors[i3 + 1] = mixed.g; colors[i3 + 2] = mixed.b;
            }

            geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: parameters.size, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

                    floatAmp: Math.random() * 0.5 + 0.15,
                    floatSpeed: Math.random() * 0.9 + 0.5,
                    phase: Math.random() * Math.PI * 2,
                    baseScale: scale
                };
                glScene.add(sprite);
                fotoSprites.push(sprite);
            }
        }

        const frasesRomanticas = [
            'Sejak kamu hadir dalam hidupku, aku merasa alam semesta telah menemukan cara sempurna untuk menata dirinya di dalam hatiku. Kamu seperti seluruh galaksi, penuh dengan misteri indah yang ingin aku temukan perlahan-lahan, seperti bintang-bintang yang bersinar bahkan di malam-malamku yang paling gelap. Terkadang aku berpikir, di antara jutaan dunia, aku sangat beruntung menemukanmu, seolah takdir telah merancang kisah kita sejak awal waktu. Dan mencintaimu terasa seperti ini; tak terbatas, dalam, dan cemerlang, seperti langit saat aku menatapnya dan memikirkan segala arti dirimu bagiku. ✨'
        ];

        function mostrarMensajeRomantico() {
            const mensaje = frasesRomanticas[Math.floor(Math.random() * frasesRomanticas.length)];
            mensajeRomantico.textContent = mensaje;
            modalCarta.classList.add('visible');
        }

        function init() {
            glScene = new THREE.Scene();
            crearEstrellasFondo();
            generateGalaxy();
            generateHeart();
            loadHeartModel();
            generateTexts();
            generatePhotos();

            const sizes = { width: window.innerWidth, height: window.innerHeight };
            glCamera = new THREE.PerspectiveCamera(75, sizes.width / sizes.height, 0.1, 600);
            glCamera.position.set(10, 12, 20);
            glScene.add(glCamera);

            glRenderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
            glRenderer.setSize(sizes.width, sizes.height);
            glRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            glControls = new THREE.OrbitControls(glCamera, glRenderer.domElement);
            glControls.enableDamping = true;
            glClock = new THREE.Clock();
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            cerrarCarta.addEventListener('click', () => {
                modalCarta.classList.remove('visible');
                modalWishlist.classList.add('visible');
            });
            modalCarta.addEventListener('click', (event) => {
                if (event.target === modalCarta) modalCarta.classList.remove('visible');
            });

            cerrarWishlist.addEventListener('click', () => modalWishlist.classList.remove('visible'));
            modalWishlist.addEventListener('click', (event) => {
                if (event.target === modalWishlist) modalWishlist.classList.remove('visible');
            });
            wishlistAddBtn.addEventListener('click', addWishlistItem);
            wishlistInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') addWishlistItem();
            });
            loadWishlist();

            canvasEl.addEventListener('pointerdown', (event) => {
                if (!heartModel) return;
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, glCamera);
                const impactos = raycaster.intersectObject(heartModel, true);
                if (impactos.length > 0) mostrarMensajeRomantico();
            });

            closeBtn.addEventListener('click', () => {
                if (active) toggleGalaxiloveOverlay();
            });

            window.addEventListener('resize', () => {
                if (!glRenderer) return;
                sizes.width = window.innerWidth;
                sizes.height = window.innerHeight;
                glCamera.aspect = sizes.width / sizes.height;
                glCamera.updateProjectionMatrix();
                glRenderer.setSize(sizes.width, sizes.height);
            });

            initialized = true;
        }

        function tick() {
            if (!active) { animationId = null; return; }
            const elapsed = glClock.getElapsedTime();

            galaxy.rotation.y += 0.001;
            heart.rotation.y += ORBIT_SYNC_SPEED;
            heart.rotation.z = Math.sin(elapsed * 1.7) * 0.08;

            if (heartModel) {
                heartModel.rotation.y += 0.01;
                heartModel.rotation.x = Math.sin(elapsed * 1.8) * 0.1;
                heartModel.position.y = 3.2 + Math.sin(elapsed * 2.2) * 0.25;
            }

            textoSprites.forEach(t => {
                const d = t.userData;
                d.orbitAngle += d.orbitSpeed;
                t.position.x = Math.cos(d.orbitAngle) * d.orbitRadius;
                t.position.z = Math.sin(d.orbitAngle) * d.orbitRadius;
                t.position.y = d.baseY + Math.sin(elapsed * d.floatSpeed + d.phase) * d.floatAmp;
                const pulse = 1 + Math.sin(elapsed * 2.4 + d.phase) * 0.1;
                t.scale.set(d.baseSize * 4 * pulse, d.baseSize * pulse, 1);
                t.material.opacity = 0.72 + Math.sin(elapsed * 1.9 + d.phase) * 0.2;
                t.lookAt(glCamera.position);
            });

            fotoSprites.forEach(s => {
                const d = s.userData;
                d.orbitAngle += d.orbitSpeed;
                s.position.x = Math.cos(d.orbitAngle) * d.orbitRadius;
                s.position.z = Math.sin(d.orbitAngle) * d.orbitRadius;
                s.position.y = d.baseY + Math.sin(elapsed * d.floatSpeed + d.phase) * d.floatAmp;
                const pulse = 1 + Math.sin(elapsed * 1.7 + d.phase) * 0.08;
                s.scale.set(d.baseScale * pulse, d.baseScale * pulse, 1);
                s.material.rotation += 0.0015;
                s.material.opacity = 0.7 + Math.sin(elapsed * 1.5 + d.phase) * 0.25;
                s.lookAt(glCamera.position);
            });

            glControls.update();
            glRenderer.render(glScene, glCamera);
            animationId = requestAnimationFrame(tick);
        }

        // Fungsi global dipanggil oleh script NebulaHeart saat gestur 👌 terdeteksi
        window.toggleGalaxiloveOverlay = function() {
            if (!initialized) init();
            active = !active;
            if (active) {
                overlay.style.display = 'block';
                if (!animationId) tick();
                musica.play().catch(() => { /* browser mungkin memblokir autoplay tanpa klik langsung, tidak apa-apa */ });
            } else {
                overlay.style.display = 'none';
                musica.pause();
            }
        };
    })();
    </script>
</body>
</html>
