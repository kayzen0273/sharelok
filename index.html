<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R V1 | P2P VOICE ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; }
        .cr-ui { border: 1px solid #0f0; background: #050505; }
        .btn-action { background: #030; border: 1px solid #0f0; transition: 0.2s; cursor: pointer; }
        .btn-action:hover:not(:disabled) { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
        .vol-meter { height: 10px; background: #111; border: 1px solid #030; position: relative; overflow: hidden; }
        .vol-level { height: 100%; background: linear-gradient(90deg, #050, #0f0); width: 0%; transition: width 0.1s; }
        .terminal { background: #000; border: 1px solid #020; font-size: 9px; height: 80px; overflow-y: auto; color: #0a0; padding: 5px; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full cr-ui p-6 rounded-lg shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-green-900 pb-2">
            <h1 class="font-black text-xl tracking-tighter italic">C.R P2P <span class="text-white">PRO</span></h1>
            <div id="netStatus" class="text-[10px] px-2 py-0.5 bg-red-900 text-red-200 rounded">OFFLINE</div>
        </div>

        <!-- ID Card -->
        <div class="mb-4 bg-green-950/20 p-3 border border-green-900 rounded">
            <label class="text-[9px] uppercase opacity-60">ID Perangkat Lo:</label>
            <div class="flex items-center justify-between">
                <span id="myIdText" class="text-white font-bold text-lg">GENERATING...</span>
                <button onclick="copyId()" class="text-[10px] underline hover:text-white">SALIN</button>
            </div>
        </div>

        <!-- Call Target -->
        <div class="mb-6">
            <input type="text" id="targetId" placeholder="Input ID Target..." class="w-full bg-black border border-green-900 p-3 text-sm outline-none focus:border-green-400 text-white placeholder:opacity-30">
        </div>

        <!-- Audio Force Trigger (Hidden by default) -->
        <div id="forceAudio" class="hidden mb-4 p-3 bg-blue-900/30 border border-blue-500 rounded text-center">
            <p class="text-[10px] text-blue-200 mb-2 font-bold uppercase">Audio Terdeteksi!</p>
            <button onclick="resumeAudio()" class="btn-action w-full py-2 text-[10px]">AKTIFKAN SUARA SEKARANG</button>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button id="btnStart" onclick="callTarget()" class="btn-action py-3 font-bold">PANGGIL</button>
            <button id="btnEnd" onclick="location.reload()" class="btn-action py-3 font-bold text-red-500 border-red-500" disabled>PUTUSKAN</button>
        </div>

        <!-- Visuals -->
        <div class="space-y-3 mb-4">
            <div>
                <div class="flex justify-between text-[8px] uppercase mb-1"><span>Mic Input</span><span id="micVal">0%</span></div>
                <div class="vol-meter"><div id="localVol" class="vol-level"></div></div>
            </div>
            <div id="remoteMeter" class="hidden">
                <div class="flex justify-between text-[8px] uppercase mb-1"><span>Target Audio</span><span id="remoteVal">0%</span></div>
                <div class="vol-meter"><div id="remoteVol" class="vol-level"></div></div>
            </div>
        </div>

        <!-- Log -->
        <div id="log" class="terminal mb-2">
            <div>[SYSTEM] Menunggu User Gigs...</div>
        </div>
        
        <p class="text-[8px] text-center opacity-30 mt-4 uppercase tracking-widest">Powered by C.R V1.0 | No Logs Policy</p>
    </div>

    <audio id="remoteAudio" autoplay playsinline></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            databaseURL: "https://apktroj-default-rtdb.firebaseio.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab",
            measurementId: "G-WR01BDY3G6"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myId = "CR-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        document.getElementById('myIdText').innerText = myId;

        let localStream, pc, audioCtx, analyser, remoteAnalyser;
        
        // Pake STUN/TURN gratisan biar nembus NAT/Firewall
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        function addLog(m) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                setupVisualizer(localStream, 'localVol', 'micVal');
                document.getElementById('netStatus').innerText = "ONLINE";
                document.getElementById('netStatus').className = "text-[10px] px-2 py-0.5 bg-green-900 text-green-200 rounded";
                addLog("Mic Ready. P2P Handshake aktif.");

                // Listen for Calls
                db.ref(`calls/${myId}/offer`).on('value', async snap => {
                    const offer = snap.val();
                    if(offer && !pc) {
                        addLog("Panggilan masuk...");
                        if(confirm("Terima panggilan?")) handleAnswer(offer);
                    }
                });
            } catch (e) {
                addLog("ERROR: Mic diblokir!");
            }
        }

        function setupVisualizer(stream, barId, textId) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const src = context.createMediaStreamSource(stream);
            const node = context.createAnalyser();
            src.connect(node);
            const data = new Uint8Array(node.frequencyBinCount);
            
            function draw() {
                node.getByteFrequencyData(data);
                let sum = data.reduce((a, b) => a + b, 0);
                let vol = Math.round((sum / data.length) * 2.5);
                document.getElementById(barId).style.width = vol + "%";
                document.getElementById(textId).innerText = vol + "%";
                requestAnimationFrame(draw);
            }
            draw();
            if(barId === 'localVol') audioCtx = context;
        }

        async function createPC(target) {
            pc = new RTCPeerConnection(rtcConfig);
            
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            pc.onicecandidate = e => {
                if(e.candidate) db.ref(`calls/${target}/ice`).push(e.candidate.toJSON());
            };

            pc.ontrack = e => {
                const remoteAudio = document.getElementById('remoteAudio');
                remoteAudio.srcObject = e.streams[0];
                document.getElementById('remoteMeter').classList.remove('hidden');
                document.getElementById('forceAudio').classList.remove('hidden');
                setupVisualizer(e.streams[0], 'remoteVol', 'remoteVal');
                addLog("Audio Terhubung!");
            };

            // Sync Ice Candidates
            db.ref(`calls/${myId}/ice`).on('child_added', s => {
                if(pc) pc.addIceCandidate(new RTCIceCandidate(s.val())).catch(e => {});
            });
        }

        async function callTarget() {
            const target = document.getElementById('targetId').value;
            if(!target) return;

            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnEnd').disabled = false;
            addLog(`Calling ${target}...`);

            await createPC(target);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            await db.ref(`calls/${target}/offer`).set({ type: offer.type, sdp: offer.sdp, from: myId });

            db.ref(`calls/${target}/answer`).on('value', async s => {
                const ans = s.val();
                if(ans && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(ans));
                    addLog("Target Menjawab.");
                }
            });
        }

        async function handleAnswer(offer) {
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnEnd').disabled = false;
            
            await createPC(offer.from);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const ans = await pc.createAnswer();
            await pc.setLocalDescription(ans);

            await db.ref(`calls/${offer.from}/answer`).set({ type: ans.type, sdp: ans.sdp });
            addLog("Menyambungkan...");
        }

        function resumeAudio() {
            const ra = document.getElementById('remoteAudio');
            ra.play();
            if(audioCtx) audioCtx.resume();
            document.getElementById('forceAudio').classList.add('hidden');
            addLog("Audio Output Diaktifkan.");
        }

        function copyId() {
            const t = document.createElement('textarea');
            t.value = myId; document.body.appendChild(t); t.select();
            document.execCommand('copy'); document.body.removeChild(t);
            addLog("ID Disalin.");
        }

        window.onload = init;
    </script>
</body>
</html>
