<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Pesan Wishlist</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root {
        --bg-deep: #0a0715;
        --bg-panel: #140f24;
        --line: #2a2140;
        --pink: #ff4da6;
        --pink-soft: #ffb3d9;
        --lilac: #b98bff;
        --text: #f1ecff;
        --text-dim: #9186b3;
        --new-glow: 0 0 0 1px rgba(255, 77, 166, 0.5), 0 0 18px rgba(255, 77, 166, 0.25);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        background:
            radial-gradient(circle at 15% 10%, rgba(185, 139, 255, 0.16), transparent 45%),
            radial-gradient(circle at 85% 90%, rgba(255, 77, 166, 0.14), transparent 45%),
            var(--bg-deep);
        color: var(--text);
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        padding: 32px 18px 60px;
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
        flex-wrap: wrap;
    }

    h1 {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: clamp(1.5rem, 4vw, 2.1rem);
        margin: 0;
        letter-spacing: 0.01em;
        background: linear-gradient(90deg, var(--pink-soft), var(--lilac));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .subtitle {
        color: var(--text-dim);
        font-size: 0.9rem;
        margin: 4px 0 26px;
    }

    .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 22px;
        flex-wrap: wrap;
    }

    .count-pill {
        font-size: 0.8rem;
        padding: 5px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--text-dim);
        background: rgba(255,255,255,0.02);
    }
    .count-pill strong { color: var(--pink-soft); font-weight: 700; }

    button.ghost-btn {
        margin-left: auto;
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text-dim);
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 0.82rem;
        cursor: pointer;
        transition: border-color .15s ease, color .15s ease;
    }
    button.ghost-btn:hover { border-color: var(--pink); color: var(--pink-soft); }

    .status-line {
        font-size: 0.82rem;
        color: var(--text-dim);
        min-height: 1.2em;
        margin-bottom: 14px;
    }
    .status-line.error { color: #ff8fb8; }

    ul.messages {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    li.card {
        background: linear-gradient(160deg, var(--bg-panel), #1b1430);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px 16px 14px;
        position: relative;
        animation: fadeIn 0.25s ease;
    }
    li.card.new { box-shadow: var(--new-glow); }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 8px;
    }

    .badge {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 3px 9px;
        border-radius: 999px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .badge.baru { background: rgba(255, 77, 166, 0.18); color: var(--pink-soft); border: 1px solid rgba(255,77,166,0.4); }
    .badge.dibaca { background: rgba(185, 139, 255, 0.12); color: var(--lilac); border: 1px solid rgba(185,139,255,0.3); }

    .msg-text {
        font-size: 1.02rem;
        line-height: 1.5;
        color: var(--text);
        word-break: break-word;
        margin: 0;
    }

    .card-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
        gap: 10px;
        flex-wrap: wrap;
    }

    .timestamp { font-size: 0.75rem; color: var(--text-dim); }

    .actions { display: flex; gap: 8px; }

    .actions button {
        border: none;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 0.78rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity .15s ease;
    }
    .actions button:hover { opacity: 0.85; }

    .btn-read { background: rgba(185, 139, 255, 0.16); color: var(--lilac); }
    .btn-delete { background: rgba(255, 77, 166, 0.14); color: var(--pink-soft); }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-dim);
        border: 1px dashed var(--line);
        border-radius: 16px;
    }
    .empty-state .glyph { font-size: 2rem; display: block; margin-bottom: 10px; }

    footer {
        text-align: center;
        color: var(--text-dim);
        font-size: 0.75rem;
        margin-top: 40px;
    }

    @media (prefers-reduced-motion: reduce) {
        li.card { animation: none; }
    }
</style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>Pesan Wishlist</h1>
        </header>
        <p class="subtitle">Daftar wishlist yang dikirim dari halaman Galaksi Cinta.</p>

        <div class="toolbar">
            <span class="count-pill">Baru: <strong id="count-baru">0</strong></span>
            <span class="count-pill">Total: <strong id="count-total">0</strong></span>
            <button class="ghost-btn" id="refresh-btn">↻ Muat ulang</button>
        </div>

        <p class="status-line" id="status-line"></p>

        <ul class="messages" id="message-list"></ul>

        <div class="empty-state" id="empty-state" style="display:none;">
            <span class="glyph">🌌</span>
            Belum ada wishlist yang dikirim.
        </div>

        <footer>Terhubung ke Supabase • pembaruan realtime aktif</footer>
    </div>

<script>
(function () {
    const SUPABASE_URL = 'https://cadtlaamaarorzrjnddl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhZHRsYWFtYWFyb3J6cmpuZGRsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTU1MTIsImV4cCI6MjA5ODY5MTUxMn0.O7HU78QkBdy8jh7HlIedeqfzHzb084PCjLeKmstR1uw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const TABLE = 'wishlist_messages';

    const listEl = document.getElementById('message-list');
    const emptyEl = document.getElementById('empty-state');
    const statusEl = document.getElementById('status-line');
    const countBaruEl = document.getElementById('count-baru');
    const countTotalEl = document.getElementById('count-total');
    const refreshBtn = document.getElementById('refresh-btn');

    function formatTime(iso) {
        try {
            const d = new Date(iso);
            return d.toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
        } catch (e) {
            return iso;
        }
    }

    function setStatus(text, isError) {
        statusEl.textContent = text || '';
        statusEl.classList.toggle('error', !!isError);
    }

    function render(messages) {
        listEl.innerHTML = '';
        countTotalEl.textContent = messages.length;
        countBaruEl.textContent = messages.filter(m => m.status === 'baru').length;

        if (messages.length === 0) {
            emptyEl.style.display = 'block';
            return;
        }
        emptyEl.style.display = 'none';

        messages.forEach(msg => {
            const li = document.createElement('li');
            li.className = 'card' + (msg.status === 'baru' ? ' new' : '');

            const top = document.createElement('div');
            top.className = 'card-top';

            const badge = document.createElement('span');
            badge.className = 'badge ' + (msg.status === 'baru' ? 'baru' : 'dibaca');
            badge.textContent = msg.status === 'baru' ? 'Baru' : 'Dibaca';

            const text = document.createElement('p');
            text.className = 'msg-text';
            text.textContent = msg.text;

            top.appendChild(badge);
            li.appendChild(top);
            li.appendChild(text);

            const bottom = document.createElement('div');
            bottom.className = 'card-bottom';

            const time = document.createElement('span');
            time.className = 'timestamp';
            time.textContent = formatTime(msg.created_at);

            const actions = document.createElement('div');
            actions.className = 'actions';

            if (msg.status === 'baru') {
                const readBtn = document.createElement('button');
                readBtn.className = 'btn-read';
                readBtn.textContent = 'Tandai dibaca';
                readBtn.addEventListener('click', () => markAsRead(msg.id));
                actions.appendChild(readBtn);
            }

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.textContent = 'Hapus';
            delBtn.addEventListener('click', () => deleteMessage(msg.id));
            actions.appendChild(delBtn);

            bottom.appendChild(time);
            bottom.appendChild(actions);
            li.appendChild(bottom);

            listEl.appendChild(li);
        });
    }

    let currentMessages = [];

    async function loadMessages() {
        setStatus('Memuat...');
        const { data, error } = await supabaseClient
            .from(TABLE)
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            setStatus('Gagal memuat: ' + error.message, true);
            return;
        }
        currentMessages = data || [];
        render(currentMessages);
        setStatus('');
    }

    async function markAsRead(id) {
        const { error } = await supabaseClient
            .from(TABLE)
            .update({ status: 'dibaca' })
            .eq('id', id);
        if (error) {
            setStatus('Gagal menandai: ' + error.message, true);
            return;
        }
        const item = currentMessages.find(m => m.id === id);
        if (item) item.status = 'dibaca';
        render(currentMessages);
    }

    async function deleteMessage(id) {
        const { error } = await supabaseClient
            .from(TABLE)
            .delete()
            .eq('id', id);
        if (error) {
            setStatus('Gagal menghapus: ' + error.message, true);
            return;
        }
        currentMessages = currentMessages.filter(m => m.id !== id);
        render(currentMessages);
    }

    refreshBtn.addEventListener('click', loadMessages);

    // Realtime: pesan baru langsung muncul tanpa perlu refresh manual
    supabaseClient
        .channel('wishlist_messages_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, () => {
            loadMessages();
        })
        .subscribe();

    loadMessages();
})();
</script>
</body>
</html>
