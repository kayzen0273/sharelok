<!DOCTYPE html>
<html>
<head>
    <title>Monitor Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background:#000; color:#0f0; text-align:center; font-family:monospace;">
    <h1>LIVE MONITOR</h1>
    <img id="liveImg" style="border:2px solid #0f0; width:80%;">
    <div id="info" style="margin-top:20px;"></div>

    <script>
        const config = {
            apiKey: "AIzaSyAQn-HOc2ut9_Dcw0LiPhvUMfzrjaLhj2Q",
            databaseURL: "https://chatroom-e9b3f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "chatroom-e9b3f"
        };
        firebase.initializeApp(config);
        const db = firebase.database().ref('simple_monitor');

        // Pantau Gambar
        db.child('img').on('value', s => {
            if(s.val()) document.getElementById('liveImg').src = s.val();
        });

        // Pantau Lokasi
        db.child('loc').on('value', s => {
            const d = s.val();
            if(d) document.getElementById('info').innerHTML = 
                `LOKASI: <a href="https://maps.google.com/?q=${d.lat},${d.lng}" target="_blank" style="color:#0f0">KLIK LIHAT MAPS</a>`;
        });
    </script>
</body>
</html>
