<!DOCTYPE html>
<html lang="id" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hand Tracker — Jemari</title>
<meta name="description" content="Real-time hand skeleton tracking with MediaPipe, dalam satu file HTML." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4ecdd;
    --text: #2e2a20;
    --muted: #8f8474;
    --muted-2: #9c9284;
    --border: #e4dac6;
    --border-2: #e8e0cf;
    --card-bg: #fbf7ec;
    --video-bg: #efe7d6;
    --pink: #d73ba0;
    --cyan: #19c7e2;
    --white: #ffffff;
    --red: #dc2626;
    --green: #22c55e;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button { cursor: pointer; font-family: inherit; }

  .page {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
  }

  .container {
    max-width: 72rem;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }

  header.top {
    margin-bottom: 2rem;
  }

  header.top h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
  }

  header.top p {
    margin: 0.25rem 0 0;
    font-size: 0.875rem;
    color: var(--muted);
  }

  .layout {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  @media (min-width: 1024px) {
    .layout { flex-direction: row; }
  }

  /* ---------- Video stage ---------- */
  .stage {
    position: relative;
    flex: 1 1 auto;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 1rem;
    border: 1px solid var(--border);
    background: var(--video-bg);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
  }

  .stage video,
  .stage canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  .stage canvas { pointer-events: none; }

  .flower-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .flower {
    position: absolute;
    width: 96px;
    height: 96px;
    margin-left: -48px;
    margin-top: -48px;
    user-select: none;
    filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.25));
    transform: scale(0) rotate(-30deg);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
  }

  .flower.in {
    transform: scale(1) rotate(0deg);
    opacity: 1;
  }

  .flower.out {
    transform: scale(0.6) rotate(0deg);
    opacity: 0;
    transition: transform 0.25s ease, opacity 0.25s ease;
  }

  .badge {
    position: absolute;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 999px;
    padding: 0.25rem 0.75rem;
    font-size: 0.75rem;
    line-height: 1.4;
  }

  .badge-square {
    border-radius: 0.5rem;
  }

  .hands-badge { top: 0.75rem; left: 0.75rem; }
  .effect-badge { top: 0.75rem; right: 0.75rem; font-weight: 500; text-transform: capitalize; }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #737373;
    flex-shrink: 0;
  }
  .dot.on { background: var(--green); }

  .gesture-stack {
    position: absolute;
    top: 3rem;
    left: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
    max-width: calc(100% - 1.5rem);
  }

  .gesture-pill {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 0.5rem;
    padding: 0.375rem 0.75rem;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: fit-content;
  }

  .gesture-pill .hname { font-weight: 500; }
  .gesture-pill .hlabel { color: var(--muted-2); }
  .gesture-pill .gname { color: var(--pink); }
  .gesture-pill .gscore { color: var(--muted-2); }

  .overlay-msg {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: 0.875rem;
    padding: 0 1.5rem;
    text-align: center;
  }

  .overlay-msg.muted { color: var(--muted-2); }
  .overlay-msg.err { color: var(--red); }

  .top-badge-corner-fallback { display: none; }

  /* ---------- Simple text badge shown top-left when camera+model not ready but not visible otherwise ---------- */

  /* ---------- Settings panel ---------- */
  .panel {
    flex-shrink: 0;
    width: 100%;
    border: 1px solid var(--border);
    background: var(--card-bg);
    border-radius: 1rem;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
  }

  @media (min-width: 1024px) {
    .panel { width: 20rem; }
  }

  .panel-header {
    padding: 1.25rem 1.5rem 0.75rem;
  }

  .panel-header h2 {
    margin: 0;
    font-size: 1.0625rem;
    font-weight: 600;
  }

  .panel-header p {
    margin: 0.25rem 0 0;
    font-size: 0.8125rem;
    color: var(--muted);
  }

  .panel-content {
    padding: 0.5rem 1.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    font-size: 0.875rem;
  }

  .num-input {
    width: 4rem;
    border-radius: 0.5rem;
    border: 1px solid var(--border);
    background: var(--white);
    padding: 0.375rem 0.5rem;
    text-align: center;
    font-size: 0.875rem;
    color: var(--text);
    outline: none;
    font-family: inherit;
  }

  .num-input:focus { border-color: #d6c9ad; }

  .toggles {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    border-top: 1px solid var(--border-2);
    padding-top: 1.5rem;
  }

  .switch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    font-size: 0.875rem;
    width: 100%;
  }

  .switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .switch .track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 999px;
    transition: background 0.2s ease;
  }

  .switch .thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: var(--white);
    border-radius: 50%;
    transition: transform 0.2s ease;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
  }

  .switch input:checked + .track { background: var(--pink); }
  .switch input:checked + .track + .thumb { transform: translateX(18px); }
  .switch input:focus-visible + .track { outline: 2px solid var(--cyan); outline-offset: 2px; }

  .hint {
    margin: 0;
    font-size: 0.75rem;
    color: var(--muted-2);
    line-height: 1.5;
  }

  a, a:visited { color: inherit; }
</style>
</head>
<body>
<div class="page">
  <div class="container">
    <header class="top">
      <h1>Hand Tracker</h1>
      <p>Real-time hand skeleton tracking with MediaPipe.</p>
    </header>

    <div class="layout">
      <!-- Video stage -->
      <div class="stage" id="stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>

        <div class="flower-layer" id="flowerLayer"></div>

        <div class="overlay-msg muted" id="cameraOffMsg" style="display:none;">Camera is off</div>
        <div class="overlay-msg muted" id="loadingMsg" style="display:flex;">Loading model…</div>
        <div class="overlay-msg err" id="errorMsg" style="display:none;"></div>

        <div class="badge hands-badge" id="handsBadge" style="display:none;">
          <span class="dot" id="handsDot"></span>
          <span id="handsText">No hands</span>
        </div>

        <div class="badge effect-badge badge-square" id="effectBadge" style="display:none;"></div>

        <div class="gesture-stack" id="gestureStack"></div>
      </div>

      <!-- Settings panel -->
      <div class="panel">
        <div class="panel-header">
          <h2>Settings</h2>
          <p>Tune tracking and display.</p>
        </div>
        <div class="panel-content">
          <label class="field-row">
            <span>Number of hands</span>
            <input class="num-input" id="numHandsInput" type="number" min="1" max="4" value="2" inputmode="numeric" />
          </label>

          <div class="toggles">
            <label class="switch-row">
              <span>Camera</span>
              <span class="switch">
                <input type="checkbox" id="cameraToggle" checked />
                <span class="track"></span>
                <span class="thumb"></span>
              </span>
            </label>

            <label class="switch-row">
              <span>Skeleton overlay</span>
              <span class="switch">
                <input type="checkbox" id="skeletonToggle" checked />
                <span class="track"></span>
                <span class="thumb"></span>
              </span>
            </label>

            <label class="switch-row">
              <span>Pinch effect</span>
              <span class="switch">
                <input type="checkbox" id="effectToggle" checked />
                <span class="track"></span>
                <span class="thumb"></span>
              </span>
            </label>

            <p class="hint">Use index and thumb fingers to activate fun effects. Close a fist then open your palm to bloom a flower.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

/* ---------------------------------------------------------------------
 * Palm-bloom detector: watches for a hand that closes into a fist and
 * then opens, and fires an event with the palm position when it does.
 * Ported 1:1 from the original React app's lib/palmBloom.ts.
 * ------------------------------------------------------------------- */
function createPalmBloom(options = {}) {
  const {
    armGesture = "Closed_Fist",
    fireGesture = "Open_Palm",
    armFrames = 2,
    palmLandmark = 9,
    mirror = false,
  } = options;

  const holdCount = {};
  const armed = {};

  function detect(result) {
    const events = [];
    const seen = new Set();

    result.gestures.forEach((g, i) => {
      const name = g[0]?.categoryName ?? "None";
      const key = result.handedness[i]?.[0]?.categoryName ?? String(i);
      seen.add(key);

      if (name === armGesture) {
        holdCount[key] = (holdCount[key] ?? 0) + 1;
        if (holdCount[key] >= armFrames) armed[key] = true;
        return;
      }

      holdCount[key] = 0;

      if (name === fireGesture && armed[key]) {
        armed[key] = false;
        const p = result.landmarks[i]?.[palmLandmark];
        if (p) {
          events.push({
            key,
            xPct: (mirror ? 1 - p.x : p.x) * 100,
            yPct: p.y * 100,
          });
        }
      }
    });

    for (const key of Object.keys(armed)) {
      if (!seen.has(key)) {
        delete armed[key];
        delete holdCount[key];
      }
    }

    return events;
  }

  function reset() {
    for (const key of Object.keys(armed)) delete armed[key];
    for (const key of Object.keys(holdCount)) delete holdCount[key];
  }

  return { detect, reset };
}

/* ---------------------------------------------------------------------
 * DOM references
 * ------------------------------------------------------------------- */
const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const flowerLayer = document.getElementById("flowerLayer");
const cameraOffMsg = document.getElementById("cameraOffMsg");
const loadingMsg = document.getElementById("loadingMsg");
const errorMsg = document.getElementById("errorMsg");
const handsBadge = document.getElementById("handsBadge");
const handsDot = document.getElementById("handsDot");
const handsText = document.getElementById("handsText");
const effectBadge = document.getElementById("effectBadge");
const gestureStack = document.getElementById("gestureStack");
const numHandsInput = document.getElementById("numHandsInput");
const cameraToggle = document.getElementById("cameraToggle");
const skeletonToggle = document.getElementById("skeletonToggle");
const effectToggle = document.getElementById("effectToggle");

/* ---------------------------------------------------------------------
 * State
 * ------------------------------------------------------------------- */
let recognizer = null;
let ready = false;
let stream = null;
let rafId = 0;
let drawUtils = null;
let mosaicCanvas = null;
let flowerId = 0;
let numHands = 2;
let skeletonOn = true;
let effectOn = true;
let cameraOn = true;

const bloom = createPalmBloom({ mirror: true });

/* ---------------------------------------------------------------------
 * Helpers
 * ------------------------------------------------------------------- */
function setError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = msg ? "grid" : "none";
  loadingMsg.style.display = "none";
}

function setHandsDetected(count) {
  handsBadge.style.display = cameraOn && ready && !errorMsg.textContent ? "inline-flex" : "none";
  handsDot.classList.toggle("on", count > 0);
  handsText.textContent = count > 0 ? `${count} hand${count > 1 ? "s" : ""} tracked` : "No hands";
}

function setGestures(list) {
  gestureStack.innerHTML = "";
  if (!(cameraOn && ready && !errorMsg.textContent)) return;
  list.forEach((g, i) => {
    if (!g.gesture || g.gesture === "None") return;
    const pill = document.createElement("div");
    pill.className = "gesture-pill";
    pill.innerHTML = `
      <span class="hname">Hand ${i + 1}${g.handedness ? ` <span class="hlabel">(${g.handedness})</span>` : ""}:</span>
      <span class="gname">${g.gesture}</span>
      ${g.score > 0 ? `<span class="gscore">${Math.round(g.score * 100)}%</span>` : ""}
    `;
    gestureStack.appendChild(pill);
  });
}

function setEffectMode(mode) {
  if (mode && cameraOn && ready && !errorMsg.textContent) {
    effectBadge.textContent = mode;
    effectBadge.style.display = "inline-flex";
  } else {
    effectBadge.style.display = "none";
  }
}

function spawnFlower(xPct, yPct) {
  const id = flowerId++;
  const img = document.createElement("img");
  img.src = FLOWER_SRC;
  img.alt = "";
  img.className = "flower";
  img.style.left = xPct + "%";
  img.style.top = yPct + "%";
  flowerLayer.appendChild(img);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => img.classList.add("in"));
  });

  setTimeout(() => {
    img.classList.remove("in");
    img.classList.add("out");
    setTimeout(() => img.remove(), 260);
  }, 3000);
}

/* ---------------------------------------------------------------------
 * Model loading
 * ------------------------------------------------------------------- */
async function initModel() {
  loadingMsg.style.display = "grid";
  loadingMsg.textContent = "Loading model…";
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm"
    );

    async function create(delegate) {
      return GestureRecognizer.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
          delegate,
        },
        runningMode: "VIDEO",
        numHands: 2,
      });
    }

    try {
      recognizer = await create("GPU");
    } catch {
      recognizer = await create("CPU");
    }

    ready = true;
    loadingMsg.style.display = "none";
    if (cameraOn) startCamera();
  } catch (err) {
    console.error(err);
    setError("Failed to load the hand tracking model.");
  }
}

/* ---------------------------------------------------------------------
 * Camera + detection loop
 * ------------------------------------------------------------------- */
async function startCamera() {
  if (!ready || !cameraOn) return;
  cameraOffMsg.style.display = "none";

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
    });
    video.srcObject = stream;
    await video.play();
    loop();
  } catch (err) {
    console.error(err);
    setError("Camera access was denied.");
  }
}

function stopCamera() {
  cancelAnimationFrame(rafId);
  if (stream) {
    stream.getTracks().forEach((t) => t.stop());
    stream = null;
  }
  video.srcObject = null;
  const ctx = canvas.getContext("2d");
  if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
  flowerLayer.innerHTML = "";
  setHandsDetected(0);
  setGestures([]);
  setEffectMode(null);
  bloom.reset();
}

function loop() {
  if (!cameraOn) return;

  if (recognizer && canvas && video.readyState >= 2) {
    const ctx = canvas.getContext("2d");
    if (!drawUtils) drawUtils = new DrawingUtils(ctx);

    if (canvas.width !== video.videoWidth) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    }

    const result = recognizer.recognizeForVideo(video, performance.now());
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setHandsDetected(result.landmarks.length);

    setGestures(
      result.gestures.map((g, i) => ({
        handedness: result.handedness[i]?.[0]?.categoryName ?? "",
        gesture: g[0]?.categoryName ?? "None",
        score: g[0]?.score ?? 0,
      }))
    );

    for (const b of bloom.detect(result)) {
      spawnFlower(b.xPct, b.yPct);
    }

    if (effectOn && result.landmarks.length > 0) {
      const hands = result.landmarks.slice(0, 2).map((lm) => ({
        thumb: { x: lm[4].x * canvas.width, y: lm[4].y * canvas.height },
        index: { x: lm[8].x * canvas.width, y: lm[8].y * canvas.height },
        thumbAbove: lm[4].y < lm[8].y,
      }));

      const bothUpwards =
        (hands.length >= 2 && hands.every((h) => h.thumbAbove)) ||
        (hands.length === 1 && hands[0].thumbAbove);
      const bothDownwards =
        (hands.length >= 2 && hands.every((h) => !h.thumbAbove)) ||
        (hands.length === 1 && !hands[0].thumbAbove);
      const mode = bothUpwards ? "flip" : bothDownwards ? "blur" : "mosaic";
      const filter = mode === "blur" ? "blur(12px)" : "none";
      setEffectMode(mode);

      const fill = (pts) => {
        const xs = pts.map((p) => p.x);
        const ys = pts.map((p) => p.y);
        const minX = Math.min(...xs);
        const minY = Math.min(...ys);
        const w = Math.max(...xs) - minX;
        const h = Math.max(...ys) - minY;
        if (w < 2 || h < 2) return;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.closePath();
        ctx.clip();
        ctx.filter = filter;
        if (mode === "mosaic") {
          const blockPx = 16;
          const sw = Math.max(1, Math.round(w / blockPx));
          const sh = Math.max(1, Math.round(h / blockPx));
          mosaicCanvas ??= document.createElement("canvas");
          mosaicCanvas.width = sw;
          mosaicCanvas.height = sh;
          const tctx = mosaicCanvas.getContext("2d");
          tctx.drawImage(video, minX, minY, w, h, 0, 0, sw, sh);
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(mosaicCanvas, 0, 0, sw, sh, minX, minY, w, h);
          ctx.imageSmoothingEnabled = true;
        } else {
          if (mode === "flip") {
            ctx.translate(minX + w / 2, minY + h / 2);
            ctx.rotate(Math.PI);
            ctx.translate(-(minX + w / 2), -(minY + h / 2));
          }
          ctx.drawImage(video, minX, minY, w, h, minX, minY, w, h);
        }
        ctx.restore();
      };

      const [a, b] = hands;
      if (b) {
        if (mode === "mosaic") fill([a.index, b.thumb, b.index, a.thumb]);
        else fill([a.index, b.index, b.thumb, a.thumb]);
      } else {
        fill([
          a.thumb,
          { x: a.index.x, y: a.thumb.y },
          a.index,
          { x: a.thumb.x, y: a.index.y },
        ]);
      }
      ctx.filter = "none";
    } else {
      setEffectMode(null);
    }

    if (skeletonOn) {
      for (const landmarks of result.landmarks) {
        drawUtils.drawConnectors(landmarks, GestureRecognizer.HAND_CONNECTIONS, {
          color: "#d73ba0",
          lineWidth: 8,
        });
        drawUtils.drawLandmarks(landmarks, { color: "#19c7e2", lineWidth: 5 });
      }
    }
  }

  rafId = requestAnimationFrame(loop);
}

/* ---------------------------------------------------------------------
 * UI wiring
 * ------------------------------------------------------------------- */
numHandsInput.addEventListener("input", () => {
  const t = numHandsInput.value;
  if (t === "" || /^[1-4]$/.test(t)) {
    if (t !== "") {
      numHands = Number(t);
      if (ready) recognizer?.setOptions({ numHands });
    }
  } else {
    numHandsInput.value = String(numHands);
  }
});
numHandsInput.addEventListener("blur", () => {
  if (numHandsInput.value === "") numHandsInput.value = String(numHands);
});

cameraToggle.addEventListener("change", () => {
  cameraOn = cameraToggle.checked;
  if (cameraOn) {
    cameraOffMsg.style.display = "none";
    if (ready) startCamera();
  } else {
    cameraOffMsg.style.display = "grid";
    stopCamera();
  }
});

skeletonToggle.addEventListener("change", () => {
  skeletonOn = skeletonToggle.checked;
});

effectToggle.addEventListener("change", () => {
  effectOn = effectToggle.checked;
});

/* ---------------------------------------------------------------------
 * Boot
 * ------------------------------------------------------------------- */
initModel();
</script>
</body>
</html>
